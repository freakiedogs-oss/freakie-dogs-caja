<!DOCTYPE html>

<head>

  <link rel="apple-touch-icon" href="/icon-192.png">
  <script>
    // Registro del service worker (necesario para que Chrome ofrezca instalar la PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
    // Captura el evento de instalación para mostrarlo en el botón interno
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      // Notifica a React que ya puede mostrar el botón
      window.__pwaReady = true;
      window.dispatchEvent(new Event('pwaready'));
    });
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      window.__pwaReady = false;
      window.dispatchEvent(new Event('pwainstalled'));
    });
    window.__installPWA = () => {
      if (deferredPrompt) { deferredPrompt.prompt(); }
    };
  </script>

    .method-btn.active{background:#e63946;border-color:#e63946;color:#fff}
    .diff-bar{padding:14px 16px;border-radius:12px;margin-top:4px;display:flex;justify-content:space-between;align-items:center}
    .diff-ok{background:#14532d33;border:1px solid #14532d}
    .diff-warn{background:#71400033;border:1px solid #713f12}
    .diff-err{background:#7f1d1d33;border:1px solid #7f1d1d}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #333;background:#1a1a1a;color:#888;transition:all .15s;white-space:nowrap}

    .stat-card{flex:1;background:#1a1a1a;border-radius:12px;padding:10px 6px;text-align:center;border:1px solid #2a2a2a;min-width:0}
  </style>

// ── Supabase Storage upload ────────────────────────────────────
const BUCKET = 'cierres-fotos';
const uploadFoto = async (file, folder) => {
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const {error} = await db.storage.from(BUCKET).upload(path, file, {cacheControl:'3600',upsert:false});
  if(error) throw new Error(error.message);
  const {data} = db.storage.from(BUCKET).getPublicUrl(path);
  return data.publicUrl;
};

// ── Toast ─────────────────────────────────────────────────────
function useToast(){
  const [msg,setMsg]=useState('');
  const show=useCallback(m=>{setMsg(m);setTimeout(()=>setMsg(''),3200)},[]);
  const Toast=()=>msg?<div className="toast">{msg}</div>:null;
  return {show,Toast};
}

// ── Estado Badge ──────────────────────────────────────────────
function EstadoBadge({estado}){
  const map={
    aprobado:{cls:'tag-green',txt:'✓ Aprobado'},
    enviado:{cls:'tag-yellow',txt:'En revisión'},
    borrador:{cls:'tag-gray',txt:'Borrador'},
    requiere_correccion:{cls:'tag-orange',txt:'⚠ Corrección'}
  };
  const s=map[estado]||{cls:'tag-gray',txt:estado};
  return <span className={`tag ${s.cls}`}>{s.txt}</span>;
}

// ── MoneyInput ────────────────────────────────────────────────
function Mi({label,value,onChange,readOnly,hint}){

// ── LOGIN ─────────────────────────────────────────────────────
function Login({onLogin}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [canInstall,setCanInstall]=useState(!!window.__pwaReady);
  useEffect(()=>{
    const on=()=>setCanInstall(true);
    const off=()=>setCanInstall(false);
    window.addEventListener('pwaready',on);
    window.addEventListener('pwainstalled',off);
    return()=>{window.removeEventListener('pwaready',on);window.removeEventListener('pwainstalled',off);};
  },[]);
  const press=async(k)=>{
    if(loading)return;
    if(k==='del'){setPin(p=>p.slice(0,-1));setErr('');return;}
    const np=pin+k; setPin(np);
    if(np.length>=4){
      setLoading(true);
      const {data,error}=await db.from('usuarios_erp').select('*').eq('pin',np).eq('activo',true).maybeSingle();
      setLoading(false);
      if(error||!data){setErr('PIN incorrecto');setPin('');return;}
      onLogin(data);
    }
  };
  const keys=['1','2','3','4','5','6','7','8','9','','0','del'];
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px'}}>
      <div style={{fontSize:42,marginBottom:8}}>🐕</div>
      <div style={{fontWeight:800,fontSize:22}}>Freakie Dogs ERP</div>
      <div style={{color:'#555',fontSize:13,marginTop:4,marginBottom:32}}>Ingresa tu PIN</div>
      <div className="pin-box">
        {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?' filled':''}`}/>)}
      </div>
      {err&&<div style={{color:'#f87171',fontSize:13,marginBottom:12}}>{err}</div>}
      {loading&&<div className="spin" style={{marginBottom:12}}/>}
      <div className="keypad">
        {keys.map((k,i)=>k===''?<div key={i}/>:
          <div key={i} className="key" onClick={()=>press(k)}>{k==='del'?'⌫':k}</div>)}
      </div>
      {canInstall&&(
        <button
          onClick={()=>window.__installPWA()}
          style={{marginTop:28,background:'#e63946',color:'#fff',border:'none',borderRadius:12,
            padding:'12px 24px',fontSize:15,fontWeight:700,cursor:'pointer',
            display:'flex',alignItems:'center',gap:8}}>
          📲 Instalar app en este dispositivo
        </button>
      )}
      {!canInstall&&(
        <div style={{marginTop:24,color:'#444',fontSize:12,textAlign:'center',maxWidth:220}}>
          En iOS: toca <b style={{color:'#888'}}>Compartir →</b> "Añadir a pantalla de inicio"
        </div>
      )}
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────
function Home({user,onCierre,onEditCierre,onDeposito,onAdmin,onLogout}){
  const {show,Toast}=useToast();
  const [cierreHoy,setCierreHoy]=useState(undefined);
  const [deleting,setDeleting]=useState(false);
  const isAdmin=user.rol==='admin';
  const storeName=user.store_code?STORES[user.store_code]||user.store_code:'Todas las sucursales';

  useEffect(()=>{
    if(!user.store_code){setCierreHoy(null);return;}
    db.from('ventas_diarias').select('*')
      .eq('fecha',today()).eq('store_code',user.store_code)
      .order('created_at',{ascending:false}).limit(1).maybeSingle()
      .then(({data})=>setCierreHoy(data||null));
  },[]);

  const eliminar=async()=>{
    if(!cierreHoy)return;
    if(!dentro18h(cierreHoy.created_at)){show('⚠️ Solo puedes eliminar en las primeras 18 horas');return;}
    if(cierreHoy.estado==='aprobado'){show('⚠️ El cierre ya fue aprobado');return;}
    if(!window.confirm('¿Eliminar el cierre de hoy?'))return;
    setDeleting(true);
    await db.from('ventas_diarias').delete().eq('id',cierreHoy.id);
    setDeleting(false); setCierreHoy(null);
    show('Cierre eliminado — puedes crear uno nuevo');
  };

  const puedeEditar=cierreHoy&&cierreHoy.estado!=='aprobado'&&
    (dentro18h(cierreHoy.created_at)||cierreHoy.estado==='requiere_correccion');
  const puedeEliminar=cierreHoy&&dentro18h(cierreHoy.created_at)&&cierreHoy.estado!=='aprobado';

  return(
    <div style={{minHeight:'100vh',padding:'0 16px 40px'}}>
      <Toast/>
      <div style={{padding:'28px 0 20px',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div style={{color:'#666',fontSize:13}}>Bienvenid@</div>
          <div style={{fontWeight:800,fontSize:20}}>{user.nombre} {user.apellido}</div>
          <div style={{color:'#555',fontSize:12,marginTop:2}}>{storeName} · {user.rol}</div>
        </div>
        <button onClick={onLogout} style={{background:'none',border:'1px solid #2a2a2a',color:'#666',padding:'6px 12px',borderRadius:8,fontSize:12,cursor:'pointer'}}>Salir</button>
      </div>

      <div className="card" style={{padding:'14px 16px',marginBottom:20}}>
        <div style={{fontSize:12,color:'#555'}}>Hoy</div>
        <div style={{fontWeight:600,fontSize:15,marginTop:2}}>
          {new Date().toLocaleDateString('es-SV',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
        </div>
      </div>

      {!isAdmin&&<>
        {cierreHoy===undefined&&<div style={{textAlign:'center',padding:20}}><div className="spin" style={{width:28,height:28,margin:'0 auto'}}/></div>}
        {cierreHoy===null&&(
          <button className="btn btn-red" onClick={onCierre} style={{marginBottom:12,fontSize:17,padding:18}}>📋 Nuevo Cierre de Caja</button>
        )}
        {cierreHoy&&(
          <div className="card" style={{borderColor:cierreHoy.estado==='aprobado'?'#14532d':cierreHoy.estado==='requiere_correccion'?'#7c2d12':'#2a2a2a',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span className="sec-title" style={{marginBottom:0}}>CIERRE DE HOY</span>
              <EstadoBadge estado={cierreHoy.estado}/>
            </div>
            <div className="row"><span style={{fontSize:13,color:'#888'}}>Turno</span><span style={{fontWeight:600}}>{cierreHoy.turno}</span></div>
            <div className="row"><span style={{fontSize:13,color:'#888'}}>Total ventas</span><span style={{fontWeight:700}}>{fmt$(cierreHoy.total_ventas_quanto)}</span></div>
            <div className="row"><span style={{fontSize:13,color:'#888'}}>Efectivo a depositar</span><span style={{fontWeight:700}}>{fmt$(cierreHoy.efectivo_real_depositar)}</span></div>
            {cierreHoy.comentario_aprobacion&&(
              <div style={{marginTop:8,padding:'8px 10px',background:'#2a1500',borderRadius:8,fontSize:13,color:'#f97316'}}>
                💬 {cierreHoy.comentario_aprobacion}
              </div>
            )}
            {(puedeEditar||puedeEliminar)&&(
              <div style={{display:'flex',gap:8,marginTop:12}}>
                {puedeEditar&&<button className="btn btn-ghost btn-sm" onClick={()=>onEditCierre(cierreHoy)} style={{flex:2}}>✏️ Editar cierre</button>}
                {puedeEliminar&&<button className="btn btn-danger btn-sm" onClick={eliminar} disabled={deleting} style={{flex:1}}>{deleting?'...':'🗑'}</button>}
              </div>
            )}
          </div>
        )}
        <button className="btn btn-ghost" onClick={onDeposito} style={{marginBottom:12}}>🏦 Registrar Depósito Bancario</button>
      </>}

      {isAdmin&&(
        <button className="btn btn-red" onClick={onAdmin} style={{marginBottom:12,fontSize:17,padding:18}}>📊 Dashboard de Cierres</button>
      )}
    </div>
  );
}

// ── MODAL EGRESO ──────────────────────────────────────────────
function ModalEgreso({motivos,onSave,onClose}){
  const [motivo,setMotivo]=useState(null);
  const [monto,setMonto]=useState('');
  const [persona,setPersona]=useState('');
  const [comentario,setComentario]=useState('');
  const [foto,setFoto]=useState(null);
  const fRef=useRef();
  const ok=motivo&&n(monto)>0&&(!motivo.requiere_persona||persona.trim())&&(!motivo.requiere_comentario||comentario.trim())&&(!motivo.requiere_foto||foto);
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>Agregar Egreso</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
          {motivos.map(m=>(
            <div key={m.id} onClick={()=>setMotivo(m)} style={{padding:'8px 14px',borderRadius:20,fontSize:13,cursor:'pointer',fontWeight:600,background:motivo?.id===m.id?'#e63946':'#1e1e1e',color:motivo?.id===m.id?'#fff':'#aaa',border:`1.5px solid ${motivo?.id===m.id?'#e63946':'#333'}`}}>{m.nombre}</div>
          ))}
        </div>
        {motivo&&<>
          <Mi label="Monto" value={monto} onChange={setMonto}/>
          {motivo.requiere_persona&&<div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Persona que recibe *</div><input className="inp" value={persona} onChange={e=>setPersona(e.target.value)} placeholder="Nombre completo"/></div>}
          {motivo.requiere_comentario&&<div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Comentario *</div><textarea className="inp" rows={2} value={comentario} onChange={e=>setComentario(e.target.value)} placeholder="Describe el gasto..." style={{resize:'none'}}/></div>}
          {motivo.requiere_foto&&<div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Foto requerida *</div><input ref={fRef} type="file" accept="image/*" capture="environment" onChange={e=>setFoto(e.target.files[0])} style={{display:'none'}}/><button className="btn btn-ghost" onClick={()=>fRef.current.click()} style={{width:'auto',padding:'10px 20px'}}>{foto?`✓ ${foto.name}`:'📷 Foto'}</button></div>}
        </>}
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Cancelar</button>
          <button className="btn btn-red" onClick={()=>ok&&onSave({motivo_id:motivo.id,motivo_nombre:motivo.nombre,monto:n(monto),persona_recibe:persona.trim()||null,comentario:comentario.trim()||null,foto_file:foto||null,foto_url:null})} disabled={!ok} style={{flex:2,opacity:ok?1:.4}}>Agregar</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL INGRESO ─────────────────────────────────────────────

  const [motivo,setMotivo]=useState(null);
  const [monto,setMonto]=useState('');

  const [comentario,setComentario]=useState('');

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>Agregar Ingreso</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
          {motivos.map(m=>(

          ))}
        </div>
        {motivo&&<>
          <Mi label="Monto" value={monto} onChange={setMonto}/>
          {motivo.requiere_evento&&<div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Nombre del evento *</div><input className="inp" value={evento} onChange={e=>setEvento(e.target.value)} placeholder="Nombre del evento"/></div>}
          {motivo.requiere_comentario&&<div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Comentario *</div><textarea className="inp" rows={2} value={comentario} onChange={e=>setComentario(e.target.value)} placeholder="Explica el ingreso..." style={{resize:'none'}}/></div>}
        </>}
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Cancelar</button>
          <button className="btn btn-red" onClick={()=>ok&&onSave({motivo_id:motivo.id,motivo_nombre:motivo.nombre,monto:n(monto),nombre_evento:evento.trim()||null,comentario:comentario.trim()||null})} disabled={!ok} style={{flex:2,opacity:ok?1:.4}}>Agregar</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL AJUSTE ──────────────────────────────────────────────
function ModalAjuste({onSave,onClose}){
  const [monto,setMonto]=useState('');
  const [de,setDe]=useState('efectivo');
  const [a,setA]=useState('tarjeta');
  const [nota,setNota]=useState('');
  const ok=n(monto)>0&&de!==a;
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>Ajuste Cruce de Método</div>
        <Mi label="Monto del ajuste" value={monto} onChange={setMonto}/>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:13,color:'#aaa',marginBottom:8}}>De método</div>
          <div style={{display:'flex',gap:6}}>{METODOS.map(m=><button key={m} className={`method-btn${de===m?' active':''}`} onClick={()=>setDe(m)}>{METODO_LABEL[m]}</button>)}</div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:13,color:'#aaa',marginBottom:8}}>A método</div>
          <div style={{display:'flex',gap:6}}>{METODOS.map(m=><button key={m} className={`method-btn${a===m?' active':''}`} onClick={()=>setA(m)}>{METODO_LABEL[m]}</button>)}</div>
        </div>
        {de===a&&<div style={{color:'#f87171',fontSize:13,marginBottom:8}}>Los métodos deben ser diferentes</div>}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Nota (opcional)</div>
          <input className="inp" value={nota} onChange={e=>setNota(e.target.value)} placeholder="Ej: cliente pagó con tarjeta pero se registró como efectivo"/>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Cancelar</button>
          <button className="btn btn-red" onClick={()=>ok&&onSave({monto:n(monto),de_metodo:de,a_metodo:a,nota:nota.trim()||null})} disabled={!ok} style={{flex:2,opacity:ok?1:.4}}>Agregar</button>
        </div>
      </div>
    </div>
  );
}

// ── CIERRE FORM (create & edit) ───────────────────────────────
function CierreForm({user,existingCierre,isAdminEdit,onBack,onSuccess}){
  const isEdit=!!existingCierre;
  const {show,Toast}=useToast();
  const [fecha,setFecha]=useState(existingCierre?.fecha||today());
  const [turno,setTurno]=useState(existingCierre?.turno||'completo');
  const [loading,setLoading]=useState(false);
  const [fetching,setFetching]=useState(false);
  const [motEg,setMotEg]=useState([]);
  const [motIn,setMotIn]=useState([]);
  const [egresos,setEgresos]=useState([]);
  const [ingresos,setIngresos]=useState([]);
  const [ajustes,setAjustes]=useState([]);
  const [showEg,setShowEg]=useState(false);
  const [showIn,setShowIn]=useState(false);
  const [showAj,setShowAj]=useState(false);
  const [loadingRelated,setLoadingRelated]=useState(isEdit);
  const [ventas,setVentas]=useState({
    efectivo_quanto:existingCierre?String(existingCierre.efectivo_quanto||0):'',
    tarjeta_quanto:existingCierre?String(existingCierre.tarjeta_quanto||0):'',
    ventas_transferencia:existingCierre?String(existingCierre.ventas_transferencia||0):'',
    ventas_link_pago:existingCierre?String(existingCierre.ventas_link_pago||0):''
  });
  const [efectivoReal,setEfectivoReal]=useState(existingCierre?String(existingCierre.efectivo_real_depositar||''):'');
  const [obs,setObs]=useState(existingCierre?.observaciones||'');
  const sv=k=>v=>setVentas(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.from('motivos_egreso').select('*').eq('activo',true).order('orden').then(({data})=>setMotEg(data||[]));
    db.from('motivos_ingreso').select('*').eq('activo',true).order('orden').then(({data})=>setMotIn(data||[]));
    if(isEdit){
      setLoadingRelated(true);
      Promise.all([
        db.from('egresos_cierre').select('*').eq('cierre_id',existingCierre.id),
        db.from('ingresos_cierre').select('*').eq('cierre_id',existingCierre.id),
        db.from('ajustes_metodo').select('*').eq('cierre_id',existingCierre.id)
      ]).then(([eg,ing,aj])=>{
        setEgresos(eg.data||[]);
        setIngresos(ing.data||[]);
        setAjustes(aj.data||[]);
        setLoadingRelated(false);
      });
    }
  },[]);

  // Auto-fetch QUANTO solo en modo crear
  useEffect(()=>{
    if(isEdit||!fecha||!user.store_code)return;
    setFetching(true);
    db.rpc('exec_sql_batch',{sql_text:`
      SELECT
        COALESCE(SUM(CASE WHEN metodo_pago ILIKE '%efectivo%' THEN total ELSE 0 END),0)::numeric(10,2) as ef,
        COALESCE(SUM(CASE WHEN metodo_pago ILIKE '%tarjeta%' OR metodo_pago ILIKE '%card%' THEN total ELSE 0 END),0)::numeric(10,2) as tar,
        COALESCE(SUM(CASE WHEN metodo_pago ILIKE '%transfer%' THEN total ELSE 0 END),0)::numeric(10,2) as tra,
        COALESCE(SUM(CASE WHEN metodo_pago ILIKE '%link%' THEN total ELSE 0 END),0)::numeric(10,2) as lnk
      FROM quanto_transacciones
      WHERE store_code='${user.store_code}' AND fecha::date='${fecha}'
    `}).then(({data,error})=>{
      if(!error&&data){const r=Array.isArray(data)?data[0]:data;if(r&&r.ef!==undefined){setVentas({efectivo_quanto:String(r.ef||0),tarjeta_quanto:String(r.tar||0),ventas_transferencia:String(r.tra||0),ventas_link_pago:String(r.lnk||0)});show('✓ Ventas QUANTO cargadas');}}
      setFetching(false);
    });
  },[fecha,user.store_code]);

  const ef=n(ventas.efectivo_quanto);
  const totalEg=egresos.reduce((s,e)=>s+n(e.monto),0);
  const totalIn=ingresos.reduce((s,e)=>s+n(e.monto),0);
  const totalVentas=ef+n(ventas.tarjeta_quanto)+n(ventas.ventas_transferencia)+n(ventas.ventas_link_pago);
  const efCalculado=ef-totalEg+totalIn;
  const efReal=n(efectivoReal);
  const difDeposito=efReal-efCalculado;
  const difClass=()=>{const a=Math.abs(difDeposito);if(efReal===0)return'diff-bar';if(a<1)return'diff-bar diff-ok';if(a<=5)return'diff-bar diff-warn';return'diff-bar diff-err';};

  const handleSubmit=async()=>{
    if(!ventas.efectivo_quanto&&ventas.efectivo_quanto!=='0'){show('⚠️ Completa las ventas QUANTO');return;}
    if(!efectivoReal){show('⚠️ Ingresa el efectivo real a depositar');return;}
    setLoading(true);
    const storeCode=existingCierre?.store_code||user.store_code;
    const payload={
      fecha,store_code:storeCode,turno,
      efectivo_quanto:ef,tarjeta_quanto:n(ventas.tarjeta_quanto),
      ventas_transferencia:n(ventas.ventas_transferencia),ventas_link_pago:n(ventas.ventas_link_pago),
      total_ventas_quanto:parseFloat(totalVentas.toFixed(2)),
      total_egresos:parseFloat(totalEg.toFixed(2)),total_ingresos:parseFloat(totalIn.toFixed(2)),
      efectivo_calculado:parseFloat(efCalculado.toFixed(2)),
      efectivo_real_depositar:efReal,
      diferencia_deposito:parseFloat(difDeposito.toFixed(2)),
      estado:'enviado',observaciones:obs.trim()||null,
      creado_por:existingCierre?.creado_por||`${user.nombre} ${user.apellido}`,
      creado_por_id:existingCierre?.creado_por_id||user.id
    };
    let cierreId;
    if(isEdit){
      const {error}=await db.from('ventas_diarias').update({
        ...payload,
        aprobado_por:existingCierre.estado==='aprobado'?existingCierre.aprobado_por:null,
        aprobado_at:existingCierre.estado==='aprobado'?existingCierre.aprobado_at:null,
        comentario_aprobacion:null
      }).eq('id',existingCierre.id);
      if(error){show('❌ '+error.message);setLoading(false);return;}
      cierreId=existingCierre.id;
      await db.from('egresos_cierre').delete().eq('cierre_id',cierreId);
      await db.from('ingresos_cierre').delete().eq('cierre_id',cierreId);
      await db.from('ajustes_metodo').delete().eq('cierre_id',cierreId);
    } else {
      const {data:cierre,error}=await db.from('ventas_diarias').upsert(payload,{onConflict:'fecha,store_code,turno'}).select().single();
      if(error){show('❌ '+error.message);setLoading(false);return;}
      cierreId=cierre.id;
    }
    if(egresos.length>0){
      const egresosConFoto=await Promise.all(egresos.map(async e=>{
        let fotoUrl=e.foto_url||null;
        if(e.foto_file){
          try{fotoUrl=await uploadFoto(e.foto_file,`egresos/${user.store_code}`);}
          catch(err){console.warn('foto egreso no subida:',err.message);}
        }
        return {cierre_id:cierreId,motivo_id:e.motivo_id,motivo_nombre:e.motivo_nombre,monto:n(e.monto),persona_recibe:e.persona_recibe||null,comentario:e.comentario||null,foto_url:fotoUrl};
      }));
      await db.from('egresos_cierre').insert(egresosConFoto);
    }
    if(ingresos.length>0) await db.from('ingresos_cierre').insert(ingresos.map(e=>({cierre_id:cierreId,motivo_id:e.motivo_id,motivo_nombre:e.motivo_nombre,monto:n(e.monto),nombre_evento:e.nombre_evento||null,comentario:e.comentario||null})));
    if(ajustes.length>0) await db.from('ajustes_metodo').insert(ajustes.map(a=>({cierre_id:cierreId,monto:n(a.monto),de_metodo:a.de_metodo,a_metodo:a.a_metodo,nota:a.nota||null})));
    setLoading(false);
    onSuccess({...payload,diferencia:difDeposito,cierre_id:cierreId});
  };

  const storeLabel=existingCierre?STORES[existingCierre.store_code]||existingCierre.store_code:STORES[user.store_code]||'-';

  if(loadingRelated) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="spin" style={{width:36,height:36}}/>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <Toast/>
      {showEg&&<ModalEgreso motivos={motEg} onClose={()=>setShowEg(false)} onSave={e=>{setEgresos(p=>[...p,e]);setShowEg(false);}}/>}
      {showIn&&<ModalIngreso motivos={motIn} onClose={()=>setShowIn(false)} onSave={e=>{setIngresos(p=>[...p,e]);setShowIn(false);}}/>}
      {showAj&&<ModalAjuste onClose={()=>setShowAj(false)} onSave={a=>{setAjustes(p=>[...p,a]);setShowAj(false);}}/>}

      <div style={{display:'flex',alignItems:'center',gap:10,padding:'20px 0 12px'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#e63946',fontSize:26,cursor:'pointer',padding:'0 4px'}}>‹</button>
        <div>
          <div style={{fontWeight:800,fontSize:17}}>{storeLabel}</div>
          <div style={{fontSize:12,color:'#666'}}>
            {isAdminEdit?'✏️ Edición Admin':isEdit?'Editar Cierre':'Cierre de Caja'} · {isAdminEdit?user.nombre+' '+user.apellido:user.nombre+' '+user.apellido}
          </div>
        </div>
        {fetching&&<div className="spin" style={{marginLeft:'auto'}}/>}
      </div>

      {isEdit&&existingCierre.estado==='requiere_correccion'&&existingCierre.comentario_aprobacion&&(
        <div style={{background:'#2a1500',border:'1px solid #7c2d12',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#f97316'}}>
          💬 <strong>Corrección solicitada:</strong> {existingCierre.comentario_aprobacion}
        </div>
      )}

      {/* Fecha + Turno */}
      <div className="card">
        <div className="sec-title">Fecha y Turno</div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Fecha</div>
          <input type="date" className="inp" value={fecha} readOnly={isEdit}
            onChange={e=>setFecha(e.target.value)}
            style={{background:isEdit?'#161616':undefined,color:isEdit?'#555':'#fff'}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['mañana','tarde','completo'].map(t=>(
            <button key={t} className={`method-btn${turno===t?' active':''}`}
              onClick={()=>!isEdit&&setTurno(t)}
              style={{padding:'12px 6px',fontSize:14,opacity:isEdit?.5:1,cursor:isEdit?'default':'pointer'}}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>
        {isEdit&&<div style={{fontSize:11,color:'#555',marginTop:8}}>* Fecha y turno no se pueden cambiar al editar</div>}
      </div>

      {/* Ventas QUANTO */}
      <div className="card">
        <div className="sec-title">Ventas QUANTO {fetching&&'(cargando...)'}</div>
        <Mi label="Efectivo QUANTO" value={ventas.efectivo_quanto} onChange={sv('efectivo_quanto')} hint={!isEdit?'Auto':undefined}/>
        <Mi label="Tarjeta QUANTO" value={ventas.tarjeta_quanto} onChange={sv('tarjeta_quanto')} hint={!isEdit?'Auto':undefined}/>
        <Mi label="Ventas por Transferencia" value={ventas.ventas_transferencia} onChange={sv('ventas_transferencia')}/>
        <Mi label="Ventas de Link de Pago" value={ventas.ventas_link_pago} onChange={sv('ventas_link_pago')}/>
        <div className="row" style={{marginTop:4}}>
          <span style={{fontSize:13,color:'#888'}}>Total ventas QUANTO</span>
          <span style={{fontWeight:700,fontSize:16}}>{fmt$(totalVentas)}</span>
        </div>
      </div>

      {/* Egresos */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span className="sec-title" style={{marginBottom:0}}>Egresos del día</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowEg(true)}>+ Agregar</button>
        </div>
        {egresos.length===0&&<div style={{color:'#444',fontSize:13,textAlign:'center',padding:'8px 0'}}>Sin egresos registrados</div>}
        {egresos.map((e,i)=>(
          <div key={i} className="line-item">
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{e.motivo_nombre}</div>
              {e.persona_recibe&&<div style={{fontSize:12,color:'#888'}}>→ {e.persona_recibe}</div>}
              {e.comentario&&<div style={{fontSize:12,color:'#888'}}>{e.comentario}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontWeight:700,color:'#f87171'}}>{fmt$(e.monto)}</span>
              <button onClick={()=>setEgresos(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:18}}>×</button>
            </div>
          </div>
        ))}
        {egresos.length>0&&<div className="row" style={{marginTop:4}}><span style={{fontSize:13,color:'#888'}}>Total egresos</span><span style={{fontWeight:700,color:'#f87171'}}>{fmt$(totalEg)}</span></div>}
      </div>

      {/* Ingresos */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span className="sec-title" style={{marginBottom:0}}>Ingresos del día</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowIn(true)}>+ Agregar</button>
        </div>
        {ingresos.length===0&&<div style={{color:'#444',fontSize:13,textAlign:'center',padding:'8px 0'}}>Sin ingresos adicionales</div>}
        {ingresos.map((e,i)=>(
          <div key={i} className="line-item">
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{e.motivo_nombre}</div>
              {e.nombre_evento&&<div style={{fontSize:12,color:'#888'}}>Evento: {e.nombre_evento}</div>}
              {e.comentario&&<div style={{fontSize:12,color:'#888'}}>{e.comentario}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontWeight:700,color:'#4ade80'}}>{fmt$(e.monto)}</span>
              <button onClick={()=>setIngresos(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:18}}>×</button>
            </div>
          </div>
        ))}
        {ingresos.length>0&&<div className="row" style={{marginTop:4}}><span style={{fontSize:13,color:'#888'}}>Total ingresos</span><span style={{fontWeight:700,color:'#4ade80'}}>{fmt$(totalIn)}</span></div>}
      </div>

      {/* Ajustes */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span className="sec-title" style={{marginBottom:0}}>Ajuste Cruce de Método</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowAj(true)}>+ Agregar</button>
        </div>
        {ajustes.length===0&&<div style={{color:'#444',fontSize:13,textAlign:'center',padding:'8px 0'}}>Sin ajustes</div>}
        {ajustes.map((a,i)=>(
          <div key={i} className="line-item">
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{fmt$(a.monto)}</div>
              <div style={{fontSize:12,color:'#888'}}>{METODO_LABEL[a.de_metodo]} → {METODO_LABEL[a.a_metodo]}</div>
              {a.nota&&<div style={{fontSize:12,color:'#555'}}>{a.nota}</div>}
            </div>
            <button onClick={()=>setAjustes(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:18}}>×</button>
          </div>
        ))}
      </div>

      {/* Resumen efectivo */}
      <div className="card">
        <div className="sec-title">Resumen de Efectivo</div>
        <div className="row"><span style={{fontSize:13,color:'#888'}}>Efectivo QUANTO</span><span style={{fontWeight:600}}>{fmt$(ef)}</span></div>
        <div className="row"><span style={{fontSize:13,color:'#888'}}>(-) Total egresos</span><span style={{fontWeight:600,color:'#f87171'}}>-{fmt$(totalEg)}</span></div>
        <div className="row"><span style={{fontSize:13,color:'#888'}}>(+) Total ingresos</span><span style={{fontWeight:600,color:'#4ade80'}}>+{fmt$(totalIn)}</span></div>
        <div className="row" style={{borderBottom:'2px solid #333',paddingBottom:14,marginBottom:14}}>
          <span style={{fontSize:14,fontWeight:700}}>Efectivo calculado a depositar</span>
          <span style={{fontWeight:800,fontSize:17}}>{fmt$(efCalculado)}</span>
        </div>
        <Mi label="Efectivo REAL que vas a depositar ★" value={efectivoReal} onChange={setEfectivoReal} hint="Requerido"/>
        {n(efectivoReal)>0&&(
          <div className={difClass()}>
            <span style={{fontSize:14}}>Diferencia</span>
            <div style={{fontWeight:800,fontSize:18,color:Math.abs(difDeposito)<1?'#4ade80':Math.abs(difDeposito)<=5?'#facc15':'#f87171'}}>
              {Math.abs(difDeposito)<0.01?'✓ Cuadra':difDeposito>0?`+${fmt$(difDeposito)} sobrante`:`${fmt$(Math.abs(difDeposito))} faltante`}
            </div>
          </div>
        )}
      </div>

      {/* Observaciones */}
      <div className="card">
        <div className="sec-title">Observaciones</div>
        <textarea className="inp" rows={3} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Notas del día, incidencias..." style={{resize:'none'}}/>
      </div>

      <button className="btn btn-red" onClick={handleSubmit} disabled={loading} style={{fontSize:17,padding:18}}>
        {loading?<span className="spin"/>:isEdit?'💾  GUARDAR CAMBIOS':'✓  ENVIAR CIERRE'}
      </button>
    </div>
  );
}

// ── DEPÓSITO BANCARIO ─────────────────────────────────────────
function Deposito({user,onBack}){
  const {show,Toast}=useToast();
  const [monto,setMonto]=useState('');
  const [fechaDep,setFechaDep]=useState(today());
  const [dias,setDias]=useState([today()]);
  const [notas,setNotas]=useState('');
  const [fotos,setFotos]=useState([]);
  const [loading,setLoading]=useState(false);
  const fRef=useRef();
  const lastDays=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().split('T')[0];});
  const submit=async()=>{
    if(!n(monto)){show('⚠️ Ingresa el monto');return;}
    if(dias.length===0){show('⚠️ Selecciona al menos un día');return;}
    if(fotos.length===0){show('⚠️ Agrega al menos una foto del voucher');return;}
    setLoading(true);
    let fotosUrls=[];
    try{
      fotosUrls=await Promise.all(fotos.map(f=>uploadFoto(f,`depositos/${user.store_code}`)));
    }catch(e){show('❌ Error subiendo foto: '+e.message);setLoading(false);return;}
    const {error}=await db.from('depositos_bancarios').insert({store_code:user.store_code,monto:n(monto),fecha_deposito:fechaDep,dias_cubiertos:dias,fotos_urls:fotosUrls,notas:notas.trim()||null,creado_por:`${user.nombre} ${user.apellido}`,creado_por_id:user.id});
    setLoading(false);
    if(error){show('❌ '+error.message);return;}
    show('✓ Depósito registrado con '+fotosUrls.length+' foto(s)');
    setTimeout(onBack,1500);
  };
  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <Toast/>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'20px 0 12px'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#e63946',fontSize:26,cursor:'pointer',padding:'0 4px'}}>‹</button>
        <div><div style={{fontWeight:800,fontSize:17}}>Depósito Bancario</div><div style={{fontSize:12,color:'#666'}}>{STORES[user.store_code]}</div></div>
      </div>
      <div className="card">
        <div className="sec-title">Datos del depósito</div>
        <Mi label="Monto depositado" value={monto} onChange={setMonto}/>
        <div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Fecha del depósito</div><input type="date" className="inp" value={fechaDep} onChange={e=>setFechaDep(e.target.value)}/></div>
      </div>
      <div className="card">
        <div className="sec-title">Días que cubre este depósito</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {lastDays.map(d=>(
            <div key={d} onClick={()=>setDias(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d].sort())}
              style={{padding:'12px 16px',borderRadius:10,cursor:'pointer',background:dias.includes(d)?'#1a3a1a':'#141414',border:`1.5px solid ${dias.includes(d)?'#4ade80':'#222'}`,display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:14,color:dias.includes(d)?'#4ade80':'#888'}}>{new Date(d+'T12:00:00').toLocaleDateString('es-SV',{weekday:'short',day:'numeric',month:'short'})}</span>
              {dias.includes(d)&&<span style={{color:'#4ade80'}}>✓</span>}
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="sec-title">Fotos del voucher</div>
        <input ref={fRef} type="file" accept="image/*" multiple onChange={e=>setFotos(Array.from(e.target.files))} style={{display:'none'}}/>
        <button className="btn btn-ghost" onClick={()=>fRef.current.click()} style={{marginBottom:8}}>📷 {fotos.length>0?`${fotos.length} foto(s)`:'Agregar fotos del voucher'}</button>
        {fotos.map((f,i)=><div key={i} style={{fontSize:12,color:'#4ade80',padding:'4px 0'}}>✓ {f.name}</div>)}
        <div style={{marginTop:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Notas</div><input className="inp" value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Banco, referencia, etc."/></div>
      </div>
      <button className="btn btn-red" onClick={submit} disabled={loading} style={{fontSize:17,padding:18}}>{loading?<span className="spin"/>:'🏦  REGISTRAR DEPÓSITO'}</button>
    </div>
  );
}

// ── DASHBOARD ADMIN ───────────────────────────────────────────
function AdminView({user,onEditCierre,onBack}){
  const {show,Toast}=useToast();
  const [fechaDesde,setFechaDesde]=useState(today());
  const [fechaHasta,setFechaHasta]=useState(today());
  const [cierres,setCierres]=useState([]);
  const [depositos,setDepositos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [comentario,setComentario]=useState('');
  const [saving,setSaving]=useState(false);
  // Filtros
  const [filtroEstados,setFiltroEstados]=useState(new Set(['todos']));
  const [filtroSucursales,setFiltroSucursales]=useState(new Set(['todas']));

  const allStoreCodes=Object.keys(STORES);
  const esRangoSimple=fechaDesde===fechaHasta;

  const cargar=async()=>{
    setLoading(true);
    const [cRes,dRes]=await Promise.all([
      db.from('ventas_diarias').select('*').gte('fecha',fechaDesde).lte('fecha',fechaHasta).order('fecha',{ascending:false}).order('store_code'),
      db.from('depositos_bancarios').select('*').gte('fecha_deposito',fechaDesde).lte('fecha_deposito',fechaHasta)
    ]);
    setCierres(cRes.data||[]);
    setDepositos(dRes.data||[]);
    setLoading(false);
  };

  useEffect(()=>{cargar();},[fechaDesde,fechaHasta]);

  // Filtros chips toggle
  const toggleEstado=e=>{
    if(e==='todos'){setFiltroEstados(new Set(['todos']));return;}
    setFiltroEstados(prev=>{
      const next=new Set(prev);next.delete('todos');
      next.has(e)?next.delete(e):next.add(e);
      if(next.size===0)next.add('todos');
      return next;
    });
  };
  const toggleSucursal=sc=>{
    if(sc==='todas'){setFiltroSucursales(new Set(['todas']));return;}
    setFiltroSucursales(prev=>{
      const next=new Set(prev);next.delete('todas');
      next.has(sc)?next.delete(sc):next.add(sc);
      if(next.size===0)next.add('todas');
      return next;
    });
  };

  // Status de una sucursal en una fecha específica
  const getStatus=(sc,fecha)=>{
    const c=cierres.find(x=>x.store_code===sc&&x.fecha===fecha);
    if(!c) return {tipo:'faltante'};
    const dep=depositos.find(d=>d.store_code===sc&&(d.fotos_urls||[]).length>0);
    if(c.estado==='aprobado'&&dep) return {tipo:'completo',cierre:c,dep};
    if(c.estado==='aprobado') return {tipo:'aprobado',cierre:c};
    if(c.estado==='requiere_correccion') return {tipo:'correccion',cierre:c};
    if(c.estado==='enviado') return {tipo:'revision',cierre:c};
    return {tipo:'borrador',cierre:c};
  };

  // Filtrar cierres para el listado
  const filteredCierres=useMemo(()=>{
    return cierres.filter(c=>{
      const estadoOk=filtroEstados.has('todos')||filtroEstados.has(c.estado)||(filtroEstados.has('completo')&&c.estado==='aprobado'&&depositos.find(d=>d.store_code===c.store_code&&(d.fotos_urls||[]).length>0));
      const sucOk=filtroSucursales.has('todas')||filtroSucursales.has(c.store_code);
      return estadoOk&&sucOk;
    });
  },[cierres,depositos,filtroEstados,filtroSucursales]);

  // KPIs basados en filtros actuales
  const kpi=useMemo(()=>{
    const base=filteredCierres.filter(c=>c.diferencia_deposito!=null);
    const totalDif=base.reduce((s,c)=>s+n(c.diferencia_deposito),0);
    const totalAbsDif=base.reduce((s,c)=>s+Math.abs(n(c.diferencia_deposito)),0);
    const totalEfCalc=base.reduce((s,c)=>s+n(c.efectivo_calculado),0);
    const pct=totalEfCalc>0?(totalAbsDif/totalEfCalc)*100:0;
    return {totalDif,totalAbsDif,totalEfCalc,pct,count:base.length};
  },[filteredCierres]);

  // Stats del rango completo (sin filtro sucursal/estado) para la barra superior
  const statsBase=useMemo(()=>{
    const out={faltante:0,revision:0,correccion:0,aprobado:0,completo:0};
    if(esRangoSimple){
      allStoreCodes.forEach(sc=>{
        const s=getStatus(sc,fechaDesde);
        if(out[s.tipo]!==undefined)out[s.tipo]++;
      });
    } else {
      cierres.forEach(c=>{
        const dep=depositos.find(d=>d.store_code===c.store_code&&(d.fotos_urls||[]).length>0);
        if(c.estado==='aprobado'&&dep)out.completo++;
        else if(c.estado==='aprobado')out.aprobado++;
        else if(c.estado==='requiere_correccion')out.correccion++;
        else if(c.estado==='enviado')out.revision++;
      });
      if(esRangoSimple) out.faltante=Math.max(0,allStoreCodes.length-cierres.length);
    }
    return out;
  },[cierres,depositos,fechaDesde,esRangoSimple]);

  const STATUS_CFG={
    faltante:{label:'Sin enviar',color:'#555',bg:'#1a1a1a',border:'#2a2a2a',icon:'—'},
    borrador:{label:'Borrador',color:'#666',bg:'#1a1a1a',border:'#2a2a2a',icon:'✏'},
    revision:{label:'Por revisar',color:'#facc15',bg:'#71400022',border:'#713f12',icon:'👁'},
    correccion:{label:'Req. corrección',color:'#f97316',bg:'#431c0322',border:'#7c2d12',icon:'⚠'},
    aprobado:{label:'Aprobado',color:'#4ade80',bg:'#14532d22',border:'#14532d',icon:'✓'},
    completo:{label:'★ Completo',color:'#4ade80',bg:'#14532d44',border:'#16a34a',icon:'★'},
  };

  const tagDif=dif=>{
    const a=Math.abs(dif||0);
    if(a<1) return <span className="tag tag-green">✓ OK</span>;
    if(a<=5) return <span className="tag tag-yellow">{fmt$(a)}</span>;
    return <span className="tag tag-red">⚠ {fmt$(a)}</span>;
  };

  const aprobar=async(estado)=>{
    if(!selected)return;
    setSaving(true);
    await db.from('ventas_diarias').update({estado,aprobado_por:`${user.nombre} ${user.apellido}`,aprobado_at:new Date().toISOString(),comentario_aprobacion:comentario.trim()||null}).eq('id',selected.id);
    setSaving(false);
    show(estado==='aprobado'?'✓ Cierre aprobado':'⚠ Marcado para corrección');
    setSelected(null); setComentario(''); cargar();
  };

  // Lista a mostrar: si rango simple, mostrar todas las sucursales (incluye faltantes)
  const displayItems=useMemo(()=>{
    if(esRangoSimple){
      // Mostrar todas las sucursales del filtro
      const stores=filtroSucursales.has('todas')?allStoreCodes:[...filtroSucursales];
      return stores.map(sc=>{
        const s=getStatus(sc,fechaDesde);
        // Aplicar filtro de estado
        if(!filtroEstados.has('todos')){
          const tipoMatch=filtroEstados.has(s.tipo)||(filtroEstados.has('enviado')&&s.tipo==='revision');
          if(!tipoMatch) return null;
        }
        return {sc,s};
      }).filter(Boolean);
    } else {
      // Mostrar lista de cierres filtrados
      return filteredCierres.map(c=>{
        const dep=depositos.find(d=>d.store_code===c.store_code&&(d.fotos_urls||[]).length>0);
        let tipo=c.estado==='aprobado'&&dep?'completo':c.estado==='aprobado'?'aprobado':c.estado==='requiere_correccion'?'correccion':c.estado==='enviado'?'revision':'borrador';
        return {sc:c.store_code,s:{tipo,cierre:c,dep}};
      });
    }
  },[esRangoSimple,cierres,depositos,filtroSucursales,filtroEstados,fechaDesde]);

  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <Toast/>

      {/* Modal cierre detalle */}
      {selected&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setSelected(null)}>
          <div className="modal">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>{STORES[selected.store_code]||selected.store_code}</div>
                <div style={{fontSize:13,color:'#666'}}>{selected.fecha} · {selected.turno} · {selected.creado_por}</div>
              </div>
              <EstadoBadge estado={selected.estado}/>
            </div>
            <div style={{margin:'14px 0 4px'}}>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Efectivo QUANTO</span><span style={{fontWeight:600}}>{fmt$(selected.efectivo_quanto)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Tarjeta QUANTO</span><span style={{fontWeight:600}}>{fmt$(selected.tarjeta_quanto)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Transferencia</span><span style={{fontWeight:600}}>{fmt$(selected.ventas_transferencia)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Link de Pago</span><span style={{fontWeight:600}}>{fmt$(selected.ventas_link_pago)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Total ventas</span><span style={{fontWeight:700}}>{fmt$(selected.total_ventas_quanto)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Egresos</span><span style={{fontWeight:600,color:'#f87171'}}>-{fmt$(selected.total_egresos)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Ingresos</span><span style={{fontWeight:600,color:'#4ade80'}}>+{fmt$(selected.total_ingresos)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Efectivo calculado</span><span style={{fontWeight:700}}>{fmt$(selected.efectivo_calculado)}</span></div>
              <div className="row"><span style={{fontWeight:700}}>Efectivo real depósito</span><span style={{fontWeight:800,fontSize:17}}>{fmt$(selected.efectivo_real_depositar)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Diferencia</span>{tagDif(selected.diferencia_deposito)}</div>
              {selected.observaciones&&<div className="row"><span style={{color:'#888',fontSize:13}}>Obs:</span><span style={{fontSize:13}}>{selected.observaciones}</span></div>}
            </div>

            {/* Edición completa → navega a CierreForm */}
            {selected.estado!=='aprobado'&&(
              <button className="btn btn-ghost" onClick={()=>{setSelected(null);onEditCierre(selected);}}
                style={{marginTop:12,marginBottom:4,fontSize:13,color:'#60a5fa',borderColor:'#1e3a5f'}}>
                ✏️ Editar cierre completo (egresos, ingresos, ventas...)
              </button>
            )}

            <div style={{marginTop:12,marginBottom:8}}>
              <div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Comentario de revisión</div>
              <textarea className="inp" rows={2} value={comentario} onChange={e=>setComentario(e.target.value)}
                placeholder="Opcional..." style={{resize:'none'}}
                readOnly={selected.estado==='aprobado'}/>
            </div>
            {selected.estado!=='aprobado'&&(
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost" onClick={()=>aprobar('requiere_correccion')} disabled={saving}
                  style={{flex:1,fontSize:13,color:'#f97316',borderColor:'#7c2d12'}}>
                  ⚠ Corrección
                </button>
                <button className="btn btn-red" onClick={()=>aprobar('aprobado')} disabled={saving} style={{flex:2}}>
                  {saving?<span className="spin"/>:'✓ Aprobar'}
                </button>
              </div>
            )}
            {selected.estado==='aprobado'&&(
              <div style={{textAlign:'center',padding:'8px 0',color:'#4ade80',fontWeight:700}}>
                ✓ Aprobado por {selected.aprobado_por}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'20px 0 12px'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#e63946',fontSize:26,cursor:'pointer',padding:'0 4px'}}>‹</button>
        <div style={{fontWeight:800,fontSize:17}}>Dashboard de Cierres</div>
      </div>

      {/* Rango de fechas */}
      <div className="card">
        <div className="sec-title">Rango de Fechas</div>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'#555',marginBottom:4}}>Desde</div>
            <input type="date" className="inp" value={fechaDesde} onChange={e=>{setFechaDesde(e.target.value);if(e.target.value>fechaHasta)setFechaHasta(e.target.value);}} style={{fontSize:14,padding:'10px 12px'}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'#555',marginBottom:4}}>Hasta</div>
            <input type="date" className="inp" value={fechaHasta} onChange={e=>setFechaHasta(e.target.value)} style={{fontSize:14,padding:'10px 12px'}}/>
          </div>
        </div>
        {/* Accesos rápidos */}
        <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
          {[
            {lbl:'Hoy',fn:()=>{setFechaDesde(today());setFechaHasta(today());}},
            {lbl:'7 días',fn:()=>{const d=new Date();d.setDate(d.getDate()-6);setFechaDesde(d.toISOString().split('T')[0]);setFechaHasta(today());}},
            {lbl:'Este mes',fn:()=>{const d=new Date();setFechaDesde(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`);setFechaHasta(today());}},
          ].map(({lbl,fn})=>(
            <button key={lbl} onClick={fn} style={{padding:'4px 12px',borderRadius:16,fontSize:12,background:'#1e1e1e',border:'1px solid #333',color:'#aaa',cursor:'pointer'}}>{lbl}</button>
          ))}
        </div>
      </div>

      {/* Stats resumen */}
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[
          {k:'faltante',l:'Sin enviar',c:'#555'},
          {k:'revision',l:'Revisión',c:'#facc15'},
          {k:'correccion',l:'Corrección',c:'#f97316'},
          {k:'aprobado',l:'Aprobado',c:'#4ade80'},
          {k:'completo',l:'Completo',c:'#4ade80'},
        ].map(({k,l,c})=>(
          <div key={k} className="stat-card">
            <div style={{fontSize:20,fontWeight:800,color:c}}>{statsBase[k]||0}</div>
            <div style={{fontSize:9,color:'#555',marginTop:2,lineHeight:1.2}}>{l}</div>
          </div>
        ))}
      </div>

      {/* KPI descuadre */}
      <div className="card" style={{background:'#111',border:'1px solid #333',marginBottom:14}}>
        <div className="sec-title">KPI — Descuadre de Efectivo</div>
        <div style={{fontSize:12,color:'#555',marginBottom:10}}>{kpi.count} cierre{kpi.count!==1?'s':''} con datos · filtros aplicados</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:11,color:'#555',marginBottom:4}}>Descuadre nominal</div>
            <div style={{fontWeight:800,fontSize:20,color:Math.abs(kpi.totalDif)<1?'#4ade80':Math.abs(kpi.totalDif)<=20?'#facc15':'#f87171'}}>
              {kpi.totalDif>=0?'+':''}{fmt$(kpi.totalDif)}
            </div>
            <div style={{fontSize:11,color:'#555',marginTop:2}}>{kpi.totalDif>0?'sobrante':kpi.totalDif<0?'faltante':'cuadrado'}</div>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:11,color:'#555',marginBottom:4}}>Magnitud absoluta</div>
            <div style={{fontWeight:800,fontSize:20,color:kpi.totalAbsDif<1?'#4ade80':kpi.totalAbsDif<=20?'#facc15':'#f87171'}}>
              {fmt$(kpi.totalAbsDif)}
            </div>
            <div style={{fontSize:11,color:'#555',marginTop:2}}>abs(diferencias)</div>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:11,color:'#555',marginBottom:4}}>% del efectivo</div>
            <div style={{fontWeight:800,fontSize:20,color:kpi.pct<0.5?'#4ade80':kpi.pct<=2?'#facc15':'#f87171'}}>
              {fmtPct(kpi.pct)}
            </div>
            <div style={{fontSize:11,color:'#555',marginTop:2}}>sobre {fmt$(kpi.totalEfCalc)} calc.</div>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div className="card">
        <div style={{fontSize:11,color:'#555',marginBottom:6,fontWeight:700,letterSpacing:1}}>ESTADO</div>
        <div className="chips">
          {[{k:'todos',l:'Todos'},{k:'enviado',l:'Por revisar'},{k:'requiere_correccion',l:'Corrección'},{k:'aprobado',l:'Aprobado'},{k:'completo',l:'★ Completo'}].map(({k,l})=>(
            <div key={k} className={`chip${filtroEstados.has(k)?' on':''}`} onClick={()=>toggleEstado(k)}>{l}</div>
          ))}
        </div>
        <div style={{fontSize:11,color:'#555',marginBottom:6,fontWeight:700,letterSpacing:1,marginTop:8}}>SUCURSAL</div>
        <div className="chips">
          <div className={`chip${filtroSucursales.has('todas')?' on':''}`} onClick={()=>toggleSucursal('todas')}>Todas</div>
          {allStoreCodes.map(sc=>(
            <div key={sc} className={`chip${filtroSucursales.has(sc)?' on':''}`} onClick={()=>toggleSucursal(sc)}>
              {STORES_SHORT[sc]||sc}
            </div>
          ))}
        </div>
      </div>

      {/* Lista */}
      {loading?(
        <div style={{textAlign:'center',padding:30}}><div className="spin" style={{width:32,height:32,margin:'0 auto'}}/></div>
      ):(
        displayItems.length===0?(
          <div style={{textAlign:'center',color:'#444',padding:30}}>Sin resultados para los filtros seleccionados</div>
        ):(
          displayItems.map(({sc,s},idx)=>{
            const cfg=STATUS_CFG[s.tipo];
            const c=s.cierre;
            return(
              <div key={`${sc}-${c?.fecha||idx}`}
                onClick={c?()=>{setSelected(c);setComentario(c.comentario_aprobacion||'');}:undefined}
                style={{background:cfg.bg,border:`1.5px solid ${cfg.border}`,borderRadius:12,padding:'14px 16px',marginBottom:10,cursor:c?'pointer':'default',opacity:s.tipo==='faltante'?.5:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{STORES[sc]}</div>
                    {c&&<div style={{fontSize:12,color:'#888',marginTop:2}}>{!esRangoSimple&&`${c.fecha} · `}{c.turno} · {c.creado_por}</div>}
                    {!c&&<div style={{fontSize:12,color:'#555',marginTop:2}}>Sin cierre registrado</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,fontSize:13,color:cfg.color}}>{cfg.icon} {cfg.label}</div>
                    {c&&<div style={{marginTop:4}}>{tagDif(c.diferencia_deposito)}</div>}
                  </div>
                </div>
                {c&&(
                  <div style={{display:'flex',gap:16,marginTop:10}}>
                    <div style={{fontSize:12}}><span style={{color:'#666'}}>Ventas: </span><span style={{fontWeight:600}}>{fmt$(c.total_ventas_quanto)}</span></div>
                    <div style={{fontSize:12}}><span style={{color:'#666'}}>Depósito: </span><span style={{fontWeight:600}}>{fmt$(c.efectivo_real_depositar)}</span></div>
                  </div>
                )}
                {s.tipo==='completo'&&s.dep&&(
                  <div style={{marginTop:6,fontSize:12,color:'#4ade80'}}>🏦 Depósito {fmt$(s.dep.monto)} confirmado con foto</div>
                )}
              </div>
            );
          })
        )
      )}
    </div>
  );
}

// ── CONFIRMACIÓN ──────────────────────────────────────────────
function Confirm({data,isEdit,user,onVolver}){
  const store=STORES[data.store_code]||data.store_code;
  const dif=data.diferencia||0;
  const difColor=Math.abs(dif)<1?'#4ade80':Math.abs(dif)<=5?'#facc15':'#f87171';
  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <div style={{textAlign:'center',padding:'48px 0 28px'}}>
        <div style={{width:72,height:72,background:'#14532d',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 14px'}}>{isEdit?'💾':'✓'}</div>
        <div style={{fontWeight:800,fontSize:22}}>{isEdit?'Cambios guardados':'Cierre enviado'}</div>
        <div style={{color:'#666',fontSize:14,marginTop:4}}>{store} · {data.fecha} · {data.turno}</div>
      </div>
      <div className="card">
        <div className="row"><span style={{color:'#888'}}>Total ventas QUANTO</span><span style={{fontWeight:700}}>{fmt$(data.total_ventas_quanto)}</span></div>
        <div className="row"><span style={{color:'#888'}}>Efectivo calculado</span><span style={{fontWeight:700}}>{fmt$(data.efectivo_calculado)}</span></div>
        <div className="row"><span style={{color:'#888'}}>Efectivo a depositar</span><span style={{fontWeight:800,fontSize:18,color:difColor}}>{fmt$(data.efectivo_real_depositar)}</span></div>
        <div className="row"><span style={{color:'#888'}}>Diferencia</span><span style={{fontWeight:700,color:difColor}}>{Math.abs(dif)<0.01?'✓ Cuadra perfectamente':dif>0?`+${fmt$(dif)} sobrante`:`${fmt$(Math.abs(dif))} faltante`}</span></div>
      </div>
      <button className="btn btn-red" onClick={onVolver} style={{marginBottom:12,padding:18}}>{isEdit?'Ver dashboard':'Nuevo cierre'}</button>
      <button className="btn btn-ghost" onClick={onVolver}>Volver al inicio</button>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState('login');
  const [lastData,setLastData]=useState(null);
  const [editCierre,setEditCierre]=useState(null);
  const [wasEdit,setWasEdit]=useState(false);
  const [returnTo,setReturnTo]=useState('home'); // 'home' | 'admin'

  // Cajero/gerente: editar su propio cierre
  const handleEditCierre=(cierre)=>{
    setEditCierre(cierre);
    setReturnTo('home');
    setScreen('cierre');
  };

  // Admin: editar cierre desde dashboard
  const handleAdminEditCierre=(cierre)=>{
    setEditCierre(cierre);
    setReturnTo('admin');
    setScreen('cierre');
  };

  const handleBack=()=>{
    setEditCierre(null);
    setScreen(returnTo);
  };

  if(screen==='login'||!user)
    return <Login onLogin={u=>{setUser(u);setScreen('home');}}/>;
  if(screen==='home')
    return <Home user={user}
      onCierre={()=>{setEditCierre(null);setReturnTo('home');setScreen('cierre');}}
      onEditCierre={handleEditCierre}
      onDeposito={()=>setScreen('deposito')}
      onAdmin={()=>setScreen('admin')}
      onLogout={()=>{setUser(null);setScreen('login');}}/>;
  if(screen==='cierre')
    return <CierreForm user={user} existingCierre={editCierre}
      isAdminEdit={returnTo==='admin'}
      onBack={handleBack}
      onSuccess={d=>{setLastData(d);setWasEdit(!!editCierre);setEditCierre(null);setScreen('confirm');}}/>;
  if(screen==='deposito')
    return <Deposito user={user} onBack={()=>setScreen('home')}/>;
  if(screen==='admin')
    return <AdminView user={user} onEditCierre={handleAdminEditCierre} onBack={()=>setScreen('home')}/>;
  if(screen==='confirm')
    return <Confirm data={lastData} isEdit={wasEdit} user={user} onVolver={()=>setScreen(returnTo==='admin'?'admin':'home')}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
