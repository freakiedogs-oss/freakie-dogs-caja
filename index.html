            <button onClick={()=>setAjustes(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:18}}>×</button>
          </div>
        ))}
      </div>

      {/* Resumen efectivo */}
      <div className="card">
        <div className="sec-title">Resumen de Efectivo</div>
        <div className="row"><span style={{fontSize:13,color:'#888'}}>Efectivo QUANTO</span><span style={{fontWeight:600}}>{fmt$(ef)}</span></div>
        <div className="row"><span style={{fontSize:13,color:'#888'}}>(-) Total egresos</span><span style={{fontWeight:600,color:'#f87171'}}>-{fmt$(totalEg)}</span></div>
        <div className="row"><span style={{fontSize:13,color:'#888'}}>(+) Total ingresos</span><span style={{fontWeight:600,color:'#4ade80'}}>+{fmt$(totalIn)}</span></div>
        <div className="row" style={{borderBottom:'2px solid #333',paddingBottom:14,marginBottom:14}}>
          <span style={{fontSize:14,fontWeight:700}}>Efectivo calculado a depositar</span>
          <span style={{fontWeight:800,fontSize:17}}>{fmt$(efCalculado)}</span>
        </div>
        <Mi label="Efectivo REAL que vas a depositar ★" value={efectivoReal} onChange={setEfectivoReal} hint="Requerido"/>
        {n(efectivoReal)>0&&(
          <div className={difClass()}>
            <span style={{fontSize:14}}>Diferencia</span>
            <div style={{fontWeight:800,fontSize:18,color:Math.abs(difDeposito)<1?'#4ade80':Math.abs(difDeposito)<=5?'#facc15':'#f87171'}}>
              {Math.abs(difDeposito)<0.01?'✓ Cuadra':difDeposito>0?`+${fmt$(difDeposito)} sobrante`:`${fmt$(Math.abs(difDeposito))} faltante`}
            </div>
          </div>
        )}
      </div>

      {/* Observaciones */}
      <div className="card">
        <div className="sec-title">Observaciones</div>
        <textarea className="inp" rows={3} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Notas del día, incidencias..." style={{resize:'none'}}/>
      </div>

      <button className="btn btn-red" onClick={handleSubmit} disabled={loading} style={{fontSize:17,padding:18}}>
        {loading?<span className="spin"/>:isEdit?'💾  GUARDAR CAMBIOS':'✓  ENVIAR CIERRE'}
      </button>
    </div>
  );
}

// ── DEPÓSITO BANCARIO ─────────────────────────────────────────
function Deposito({user,onBack}){
  const {show,Toast}=useToast();
  const [monto,setMonto]=useState('');
  const [fechaDep,setFechaDep]=useState(today());
  const [dias,setDias]=useState([today()]);
  const [notas,setNotas]=useState('');
  const [fotos,setFotos]=useState([]);
  const [loading,setLoading]=useState(false);
  const fRef=useRef();
  const lastDays=Array.from({length:7},(_,i)=>{return new Date(Date.now()-6*3600*1000-i*86400*1000).toISOString().split('T')[0];});
  const submit=async()=>{
    if(!n(monto)){show('⚠️ Ingresa el monto');return;}
    if(dias.length===0){show('⚠️ Selecciona al menos un día');return;}
    if(fotos.length===0){show('⚠️ Agrega al menos una foto del voucher');return;}
    setLoading(true);
    let fotosUrls=[];
    try{
      fotosUrls=await Promise.all(fotos.map(f=>uploadFoto(f,`depositos/${user.store_code}`)));
    }catch(e){show('❌ Error subiendo foto: '+e.message);setLoading(false);return;}
    const {error}=await db.from('depositos_bancarios').insert({store_code:user.store_code,monto:n(monto),fecha_deposito:fechaDep,dias_cubiertos:dias,fotos_urls:fotosUrls,notas:notas.trim()||null,creado_por:`${user.nombre} ${user.apellido}`,creado_por_id:user.id});
    setLoading(false);
    if(error){show('❌ '+error.message);return;}
    show('✓ Depósito registrado con '+fotosUrls.length+' foto(s)');
    setTimeout(onBack,1500);
  };
  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <Toast/>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'20px 0 12px'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#e63946',fontSize:26,cursor:'pointer',padding:'0 4px'}}>‹</button>
        <div><div style={{fontWeight:800,fontSize:17}}>Depósito Bancario</div><div style={{fontSize:12,color:'#666'}}>{STORES[user.store_code]}</div></div>
      </div>
      <div className="card">
        <div className="sec-title">Datos del depósito</div>
        <Mi label="Monto depositado" value={monto} onChange={setMonto}/>
        <div style={{marginBottom:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Fecha del depósito</div><input type="date" className="inp" value={fechaDep} onChange={e=>setFechaDep(e.target.value)}/></div>
      </div>
      <div className="card">
        <div className="sec-title">Días que cubre este depósito</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {lastDays.map(d=>(
            <div key={d} onClick={()=>setDias(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d].sort())}
              style={{padding:'12px 16px',borderRadius:10,cursor:'pointer',background:dias.includes(d)?'#1a3a1a':'#141414',border:`1.5px solid ${dias.includes(d)?'#4ade80':'#222'}`,display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:14,color:dias.includes(d)?'#4ade80':'#888'}}>{new Date(d+'T12:00:00').toLocaleDateString('es-SV',{weekday:'short',day:'numeric',month:'short'})}</span>
              {dias.includes(d)&&<span style={{color:'#4ade80'}}>✓</span>}
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="sec-title">Fotos del voucher</div>
        <input ref={fRef} type="file" accept="image/*" multiple onChange={e=>setFotos(Array.from(e.target.files))} style={{display:'none'}}/>
        <button className="btn btn-ghost" onClick={()=>fRef.current.click()} style={{marginBottom:8}}>📷 {fotos.length>0?`${fotos.length} foto(s)`:'Agregar fotos del voucher'}</button>
        {fotos.map((f,i)=><div key={i} style={{fontSize:12,color:'#4ade80',padding:'4px 0'}}>✓ {f.name}</div>)}
        <div style={{marginTop:12}}><div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Notas</div><input className="inp" value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Banco, referencia, etc."/></div>
      </div>
      <button className="btn btn-red" onClick={submit} disabled={loading} style={{fontSize:17,padding:18}}>{loading?<span className="spin"/>:'🏦  REGISTRAR DEPÓSITO'}</button>
    </div>
  );
}

// ── DASHBOARD ADMIN ───────────────────────────────────────────
function AdminView({user,onEditCierre,onBack}){
  const {show,Toast}=useToast();
  const [fechaDesde,setFechaDesde]=useState(today());
  const [fechaHasta,setFechaHasta]=useState(today());
  const [cierres,setCierres]=useState([]);
  const [depositos,setDepositos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [comentario,setComentario]=useState('');
  const [saving,setSaving]=useState(false);
  // Filtros
  const [filtroEstados,setFiltroEstados]=useState(new Set(['todos']));
  const [filtroSucursales,setFiltroSucursales]=useState(new Set(['todas']));

  const allStoreCodes=Object.keys(STORES);
  const esRangoSimple=fechaDesde===fechaHasta;

  const cargar=async()=>{
    setLoading(true);
    const [cRes,dRes]=await Promise.all([
      db.from('ventas_diarias').select('*').gte('fecha',fechaDesde).lte('fecha',fechaHasta).order('fecha',{ascending:false}).order('store_code'),
      db.from('depositos_bancarios').select('*').gte('fecha_deposito',fechaDesde).lte('fecha_deposito',fechaHasta)
    ]);
    setCierres(cRes.data||[]);
    setDepositos(dRes.data||[]);
    setLoading(false);
  };

  useEffect(()=>{cargar();},[fechaDesde,fechaHasta]);

  // Filtros chips toggle
  const toggleEstado=e=>{
    if(e==='todos'){setFiltroEstados(new Set(['todos']));return;}
    setFiltroEstados(prev=>{
      const next=new Set(prev);next.delete('todos');
      next.has(e)?next.delete(e):next.add(e);
      if(next.size===0)next.add('todos');
      return next;
    });
  };
  const toggleSucursal=sc=>{
    if(sc==='todas'){setFiltroSucursales(new Set(['todas']));return;}
    setFiltroSucursales(prev=>{
      const next=new Set(prev);next.delete('todas');
      next.has(sc)?next.delete(sc):next.add(sc);
      if(next.size===0)next.add('todas');
      return next;
    });
  };

  // Status de una sucursal en una fecha específica
  const getStatus=(sc,fecha)=>{
    const c=cierres.find(x=>x.store_code===sc&&x.fecha===fecha);
    if(!c) return {tipo:'faltante'};
    const dep=depositos.find(d=>d.store_code===sc&&(d.fotos_urls||[]).length>0);
    if(c.estado==='aprobado'&&dep) return {tipo:'completo',cierre:c,dep};
    if(c.estado==='aprobado') return {tipo:'aprobado',cierre:c};
    if(c.estado==='requiere_correccion') return {tipo:'correccion',cierre:c};
    if(c.estado==='enviado') return {tipo:'revision',cierre:c};
    return {tipo:'borrador',cierre:c};
  };

  // Filtrar cierres para el listado
  const filteredCierres=useMemo(()=>{
    return cierres.filter(c=>{
      const estadoOk=filtroEstados.has('todos')||filtroEstados.has(c.estado)||(filtroEstados.has('completo')&&c.estado==='aprobado'&&depositos.find(d=>d.store_code===c.store_code&&(d.fotos_urls||[]).length>0));
      const sucOk=filtroSucursales.has('todas')||filtroSucursales.has(c.store_code);
      return estadoOk&&sucOk;
    });
  },[cierres,depositos,filtroEstados,filtroSucursales]);

  // KPIs basados en filtros actuales
  const kpi=useMemo(()=>{
    const base=filteredCierres.filter(c=>c.diferencia_deposito!=null);
    const totalDif=base.reduce((s,c)=>s+n(c.diferencia_deposito),0);
    const totalAbsDif=base.reduce((s,c)=>s+Math.abs(n(c.diferencia_deposito)),0);
    const totalEfCalc=base.reduce((s,c)=>s+n(c.efectivo_calculado),0);
    const pct=totalEfCalc>0?(totalAbsDif/totalEfCalc)*100:0;
    return {totalDif,totalAbsDif,totalEfCalc,pct,count:base.length};
  },[filteredCierres]);

  // Stats del rango completo (sin filtro sucursal/estado) para la barra superior
  const statsBase=useMemo(()=>{
    const out={faltante:0,revision:0,correccion:0,aprobado:0,completo:0};
    if(esRangoSimple){
      allStoreCodes.forEach(sc=>{
        const s=getStatus(sc,fechaDesde);
        if(out[s.tipo]!==undefined)out[s.tipo]++;
      });
    } else {
      cierres.forEach(c=>{
        const dep=depositos.find(d=>d.store_code===c.store_code&&(d.fotos_urls||[]).length>0);
        if(c.estado==='aprobado'&&dep)out.completo++;
        else if(c.estado==='aprobado')out.aprobado++;
        else if(c.estado==='requiere_correccion')out.correccion++;
        else if(c.estado==='enviado')out.revision++;
      });
      if(esRangoSimple) out.faltante=Math.max(0,allStoreCodes.length-cierres.length);
    }
    return out;
  },[cierres,depositos,fechaDesde,esRangoSimple]);

  const STATUS_CFG={
    faltante:{label:'Sin enviar',color:'#555',bg:'#1a1a1a',border:'#2a2a2a',icon:'—'},
    borrador:{label:'Borrador',color:'#666',bg:'#1a1a1a',border:'#2a2a2a',icon:'✏'},
    revision:{label:'Por revisar',color:'#facc15',bg:'#71400022',border:'#713f12',icon:'👁'},
    correccion:{label:'Req. corrección',color:'#f97316',bg:'#431c0322',border:'#7c2d12',icon:'⚠'},
    aprobado:{label:'Aprobado',color:'#4ade80',bg:'#14532d22',border:'#14532d',icon:'✓'},
    completo:{label:'★ Completo',color:'#4ade80',bg:'#14532d44',border:'#16a34a',icon:'★'},
  };

  const tagDif=dif=>{
    const a=Math.abs(dif||0);
    if(a<1) return <span className="tag tag-green">✓ OK</span>;
    if(a<=5) return <span className="tag tag-yellow">{fmt$(a)}</span>;
    return <span className="tag tag-red">⚠ {fmt$(a)}</span>;
  };

  const aprobar=async(estado)=>{
    if(!selected)return;
    setSaving(true);
    await db.from('ventas_diarias').update({estado,aprobado_por:`${user.nombre} ${user.apellido}`,aprobado_at:new Date().toISOString(),comentario_aprobacion:comentario.trim()||null}).eq('id',selected.id);
    setSaving(false);
    show(estado==='aprobado'?'✓ Cierre aprobado':'⚠ Marcado para corrección');
    setSelected(null); setComentario(''); cargar();
  };

  // Lista a mostrar: si rango simple, mostrar todas las sucursales (incluye faltantes)
  const displayItems=useMemo(()=>{
    if(esRangoSimple){
      // Mostrar todas las sucursales del filtro
      const stores=filtroSucursales.has('todas')?allStoreCodes:[...filtroSucursales];
      return stores.map(sc=>{
        const s=getStatus(sc,fechaDesde);
        // Aplicar filtro de estado
        if(!filtroEstados.has('todos')){
          const tipoMatch=filtroEstados.has(s.tipo)||(filtroEstados.has('enviado')&&s.tipo==='revision');
          if(!tipoMatch) return null;
        }
        return {sc,s};
      }).filter(Boolean);
    } else {
      // Mostrar lista de cierres filtrados
      return filteredCierres.map(c=>{
        const dep=depositos.find(d=>d.store_code===c.store_code&&(d.fotos_urls||[]).length>0);
        let tipo=c.estado==='aprobado'&&dep?'completo':c.estado==='aprobado'?'aprobado':c.estado==='requiere_correccion'?'correccion':c.estado==='enviado'?'revision':'borrador';
        return {sc:c.store_code,s:{tipo,cierre:c,dep}};
      });
    }
  },[esRangoSimple,cierres,depositos,filtroSucursales,filtroEstados,fechaDesde]);

  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <Toast/>

      {/* Modal cierre detalle */}
      {selected&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setSelected(null)}>
          <div className="modal">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>{STORES[selected.store_code]||selected.store_code}</div>
                <div style={{fontSize:13,color:'#666'}}>{selected.fecha} · {selected.turno} · {selected.creado_por}</div>
              </div>
              <EstadoBadge estado={selected.estado}/>
            </div>
            <div style={{margin:'14px 0 4px'}}>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Efectivo QUANTO</span><span style={{fontWeight:600}}>{fmt$(selected.efectivo_quanto)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Tarjeta QUANTO</span><span style={{fontWeight:600}}>{fmt$(selected.tarjeta_quanto)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Transferencia</span><span style={{fontWeight:600}}>{fmt$(selected.ventas_transferencia)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Link de Pago</span><span style={{fontWeight:600}}>{fmt$(selected.ventas_link_pago)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Total ventas</span><span style={{fontWeight:700}}>{fmt$(selected.total_ventas_quanto)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Egresos</span><span style={{fontWeight:600,color:'#f87171'}}>-{fmt$(selected.total_egresos)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Ingresos</span><span style={{fontWeight:600,color:'#4ade80'}}>+{fmt$(selected.total_ingresos)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Efectivo calculado</span><span style={{fontWeight:700}}>{fmt$(selected.efectivo_calculado)}</span></div>
              <div className="row"><span style={{fontWeight:700}}>Efectivo real depósito</span><span style={{fontWeight:800,fontSize:17}}>{fmt$(selected.efectivo_real_depositar)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Diferencia</span>{tagDif(selected.diferencia_deposito)}</div>
              {selected.observaciones&&<div className="row"><span style={{color:'#888',fontSize:13}}>Obs:</span><span style={{fontSize:13}}>{selected.observaciones}</span></div>}
            </div>

            {/* Edición completa → navega a CierreForm */}
            {selected.estado!=='aprobado'&&(
              <button className="btn btn-ghost" onClick={()=>{setSelected(null);onEditCierre(selected);}}
                style={{marginTop:12,marginBottom:4,fontSize:13,color:'#60a5fa',borderColor:'#1e3a5f'}}>
                ✏️ Editar cierre completo (egresos, ingresos, ventas...)
              </button>
            )}

            <div style={{marginTop:12,marginBottom:8}}>
              <div style={{fontSize:13,color:'#aaa',marginBottom:5}}>Comentario de revisión</div>
              <textarea className="inp" rows={2} value={comentario} onChange={e=>setComentario(e.target.value)}
                placeholder="Opcional..." style={{resize:'none'}}
                readOnly={selected.estado==='aprobado'}/>
            </div>
            {selected.estado!=='aprobado'&&(
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost" onClick={()=>aprobar('requiere_correccion')} disabled={saving}
                  style={{flex:1,fontSize:13,color:'#f97316',borderColor:'#7c2d12'}}>
                  ⚠ Corrección
                </button>
                <button className="btn btn-red" onClick={()=>aprobar('aprobado')} disabled={saving} style={{flex:2}}>
                  {saving?<span className="spin"/>:'✓ Aprobar'}
                </button>
              </div>
            )}
            {selected.estado==='aprobado'&&(
              <div style={{textAlign:'center',padding:'8px 0',color:'#4ade80',fontWeight:700}}>
                ✓ Aprobado por {selected.aprobado_por}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'20px 0 12px'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#e63946',fontSize:26,cursor:'pointer',padding:'0 4px'}}>‹</button>
        <div style={{fontWeight:800,fontSize:17}}>Dashboard de Cierres</div>
      </div>

      {/* Rango de fechas */}
      <div className="card">
        <div className="sec-title">Rango de Fechas</div>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'#555',marginBottom:4}}>Desde</div>
            <input type="date" className="inp" value={fechaDesde} onChange={e=>{setFechaDesde(e.target.value);if(e.target.value>fechaHasta)setFechaHasta(e.target.value);}} style={{fontSize:14,padding:'10px 12px'}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'#555',marginBottom:4}}>Hasta</div>
            <input type="date" className="inp" value={fechaHasta} onChange={e=>setFechaHasta(e.target.value)} style={{fontSize:14,padding:'10px 12px'}}/>
          </div>
        </div>
        {/* Accesos rápidos */}
        <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
          {[
            {lbl:'Hoy',fn:()=>{setFechaDesde(today());setFechaHasta(today());}},
            {lbl:'7 días',fn:()=>{const d=new Date(Date.now()-6*3600*1000);d.setUTCDate(d.getUTCDate()-6);setFechaDesde(d.toISOString().split('T')[0]);setFechaHasta(today());}},
            {lbl:'Este mes',fn:()=>{const d=new Date(Date.now()-6*3600*1000);setFechaDesde(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-01`);setFechaHasta(today());}},
          ].map(({lbl,fn})=>(
            <button key={lbl} onClick={fn} style={{padding:'4px 12px',borderRadius:16,fontSize:12,background:'#1e1e1e',border:'1px solid #333',color:'#aaa',cursor:'pointer'}}>{lbl}</button>
          ))}
        </div>
      </div>

      {/* Stats resumen */}
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[
          {k:'faltante',l:'Sin enviar',c:'#555'},
          {k:'revision',l:'Revisión',c:'#facc15'},
          {k:'correccion',l:'Corrección',c:'#f97316'},
          {k:'aprobado',l:'Aprobado',c:'#4ade80'},
          {k:'completo',l:'Completo',c:'#4ade80'},
        ].map(({k,l,c})=>(
          <div key={k} className="stat-card">
            <div style={{fontSize:20,fontWeight:800,color:c}}>{statsBase[k]||0}</div>
            <div style={{fontSize:9,color:'#555',marginTop:2,lineHeight:1.2}}>{l}</div>
          </div>
        ))}
      </div>

      {/* KPI descuadre */}
      <div className="card" style={{background:'#111',border:'1px solid #333',marginBottom:14}}>
        <div className="sec-title">KPI — Descuadre de Efectivo</div>
        <div style={{fontSize:12,color:'#555',marginBottom:10}}>{kpi.count} cierre{kpi.count!==1?'s':''} con datos · filtros aplicados</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:11,color:'#555',marginBottom:4}}>Descuadre nominal</div>
            <div style={{fontWeight:800,fontSize:20,color:Math.abs(kpi.totalDif)<1?'#4ade80':Math.abs(kpi.totalDif)<=20?'#facc15':'#f87171'}}>
              {kpi.totalDif>=0?'+':''}{fmt$(kpi.totalDif)}
            </div>
            <div style={{fontSize:11,color:'#555',marginTop:2}}>{kpi.totalDif>0?'sobrante':kpi.totalDif<0?'faltante':'cuadrado'}</div>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:11,color:'#555',marginBottom:4}}>Magnitud absoluta</div>
            <div style={{fontWeight:800,fontSize:20,color:kpi.totalAbsDif<1?'#4ade80':kpi.totalAbsDif<=20?'#facc15':'#f87171'}}>
              {fmt$(kpi.totalAbsDif)}
            </div>
            <div style={{fontSize:11,color:'#555',marginTop:2}}>abs(diferencias)</div>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:11,color:'#555',marginBottom:4}}>% del efectivo</div>
            <div style={{fontWeight:800,fontSize:20,color:kpi.pct<0.5?'#4ade80':kpi.pct<=2?'#facc15':'#f87171'}}>
              {fmtPct(kpi.pct)}
            </div>
            <div style={{fontSize:11,color:'#555',marginTop:2}}>sobre {fmt$(kpi.totalEfCalc)} calc.</div>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div className="card">
        <div style={{fontSize:11,color:'#555',marginBottom:6,fontWeight:700,letterSpacing:1}}>ESTADO</div>
        <div className="chips">
          {[{k:'todos',l:'Todos'},{k:'enviado',l:'Por revisar'},{k:'requiere_correccion',l:'Corrección'},{k:'aprobado',l:'Aprobado'},{k:'completo',l:'★ Completo'}].map(({k,l})=>(
            <div key={k} className={`chip${filtroEstados.has(k)?' on':''}`} onClick={()=>toggleEstado(k)}>{l}</div>
          ))}
        </div>
        <div style={{fontSize:11,color:'#555',marginBottom:6,fontWeight:700,letterSpacing:1,marginTop:8}}>SUCURSAL</div>
        <div className="chips">
          <div className={`chip${filtroSucursales.has('todas')?' on':''}`} onClick={()=>toggleSucursal('todas')}>Todas</div>
          {allStoreCodes.map(sc=>(
            <div key={sc} className={`chip${filtroSucursales.has(sc)?' on':''}`} onClick={()=>toggleSucursal(sc)}>
              {STORES_SHORT[sc]||sc}
            </div>
          ))}
        </div>
      </div>

      {/* Lista */}
      {loading?(
        <div style={{textAlign:'center',padding:30}}><div className="spin" style={{width:32,height:32,margin:'0 auto'}}/></div>
      ):(
        displayItems.length===0?(
          <div style={{textAlign:'center',color:'#444',padding:30}}>Sin resultados para los filtros seleccionados</div>
        ):(
          displayItems.map(({sc,s},idx)=>{
            const cfg=STATUS_CFG[s.tipo];
            const c=s.cierre;
            return(
              <div key={`${sc}-${c?.fecha||idx}`}
                onClick={c?()=>{setSelected(c);setComentario(c.comentario_aprobacion||'');}:undefined}
                style={{background:cfg.bg,border:`1.5px solid ${cfg.border}`,borderRadius:12,padding:'14px 16px',marginBottom:10,cursor:c?'pointer':'default',opacity:s.tipo==='faltante'?.5:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{STORES[sc]}</div>
                    {c&&<div style={{fontSize:12,color:'#888',marginTop:2}}>{!esRangoSimple&&`${c.fecha} · `}{c.turno} · {c.creado_por}</div>}
                    {!c&&<div style={{fontSize:12,color:'#555',marginTop:2}}>Sin cierre registrado</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,fontSize:13,color:cfg.color}}>{cfg.icon} {cfg.label}</div>
                    {c&&<div style={{marginTop:4}}>{tagDif(c.diferencia_deposito)}</div>}
                  </div>
                </div>
                {c&&(
                  <div style={{display:'flex',gap:16,marginTop:10}}>
                    <div style={{fontSize:12}}><span style={{color:'#666'}}>Ventas: </span><span style={{fontWeight:600}}>{fmt$(c.total_ventas_quanto)}</span></div>
                    <div style={{fontSize:12}}><span style={{color:'#666'}}>Depósito: </span><span style={{fontWeight:600}}>{fmt$(c.efectivo_real_depositar)}</span></div>
                  </div>
                )}
                {s.tipo==='completo'&&s.dep&&(
                  <div style={{marginTop:6,fontSize:12,color:'#4ade80'}}>🏦 Depósito {fmt$(s.dep.monto)} confirmado con foto</div>
                )}
              </div>
            );
          })
        )
      )}
    </div>
  );
}

// ── CONFIRMACIÓN ──────────────────────────────────────────────
function Confirm({data,isEdit,user,onVolver}){
  const store=STORES[data.store_code]||data.store_code;
  const dif=data.diferencia||0;
  const difColor=Math.abs(dif)<1?'#4ade80':Math.abs(dif)<=5?'#facc15':'#f87171';
  return(
    <div style={{minHeight:'100vh',padding:'0 16px 50px'}}>
      <div style={{textAlign:'center',padding:'48px 0 28px'}}>
        <div style={{width:72,height:72,background:'#14532d',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 14px'}}>{isEdit?'💾':'✓'}</div>
        <div style={{fontWeight:800,fontSize:22}}>{isEdit?'Cambios guardados':'Cierre enviado'}</div>
        <div style={{color:'#666',fontSize:14,marginTop:4}}>{store} · {data.fecha} · {data.turno}</div>
      </div>
      <div className="card">
        <div className="row"><span style={{color:'#888'}}>Total ventas QUANTO</span><span style={{fontWeight:700}}>{fmt$(data.total_ventas_quanto)}</span></div>
        <div className="row"><span style={{color:'#888'}}>Efectivo calculado</span><span style={{fontWeight:700}}>{fmt$(data.efectivo_calculado)}</span></div>
        <div className="row"><span style={{color:'#888'}}>Efectivo a depositar</span><span style={{fontWeight:800,fontSize:18,color:difColor}}>{fmt$(data.efectivo_real_depositar)}</span></div>
        <div className="row"><span style={{color:'#888'}}>Diferencia</span><span style={{fontWeight:700,color:difColor}}>{Math.abs(dif)<0.01?'✓ Cuadra perfectamente':dif>0?`+${fmt$(dif)} sobrante`:`${fmt$(Math.abs(dif))} faltante`}</span></div>
      </div>
      <button className="btn btn-red" onClick={onVolver} style={{marginBottom:12,padding:18}}>{isEdit?'Ver dashboard':'Nuevo cierre'}</button>
      <button className="btn btn-ghost" onClick={onVolver}>Volver al inicio</button>
    </div>
  );
}

// ── DASHBOARD ANALYTICS ───────────────────────────────────────
function DashboardVentas({user,onBack}){
  const {show,Toast}=useToast();
  const [tab,setTab]=useState('hoy');
  const [loading,setLoading]=useState(true);
  const [perf,setPerf]=useState([]);
  const [tendencia,setTendencia]=useState([]);
  const [productos,setProductos]=useState([]);
  const [semanal,setSemanal]=useState([]);
  const [costos,setCostos]=useState([]);
  const [miSucursal,setMiSucursal]=useState(null); // {id, nombre} para gerente
  const isAdmin=user.rol==='admin';

  useEffect(()=>{
    const cargar=async()=>{
      try{
        const hace14=new Date(Date.now()-6*3600*1000-14*86400*1000).toISOString().split('T')[0];
        // Gerente: resolver su sucursal_id y nombre desde store_code
        let filtroId=null, filtroNombre=null;
        if(!isAdmin&&user.store_code){
          const {data:map}=await db.from('quanto_store_mapping')
            .select('sucursal_id, sucursales(nombre)')
            .eq('store_code',user.store_code).maybeSingle();
          filtroId=map?.sucursal_id||null;
          filtroNombre=map?.sucursales?.nombre||null;
          if(filtroId) setMiSucursal({id:filtroId,nombre:filtroNombre});
        }
        // Queries con filtro opcional
        let perfQ=db.from('vista_performance_vs_meta').select('*').order('ventas_reales',{ascending:false});
        let tendQ=db.from('vista_ventas_diarias').select('*').gte('fecha',hace14).order('fecha',{ascending:true});
        if(filtroId){perfQ=perfQ.eq('sucursal_id',filtroId);tendQ=tendQ.eq('sucursal_id',filtroId);}
        const[pRes,tRes,prRes,sRes,cRes]=await Promise.all([
          perfQ, tendQ,
          db.from('vista_top_productos').select('*').order('revenue_total',{ascending:false}).limit(20),
          isAdmin?db.from('vista_patron_semanal').select('*').order('dia_num',{ascending:true}):Promise.resolve({data:[]}),
          db.from('vista_labor_cost_ratio').select('*')
        ]);
        setPerf(pRes.data||[]);
        setTendencia(tRes.data||[]);
        setProductos(prRes.data||[]);
        setSemanal(sRes.data||[]);
        const todosCostos=cRes.data||[];
        setCostos(filtroNombre?todosCostos.filter(c=>c.sucursal===filtroNombre):todosCostos);
        setLoading(false);
      }catch(e){show('Error cargando datos');setLoading(false);}
    };
    cargar();
  },[]);

  const TABS=[{k:'hoy',label:'📊 Hoy'},{k:'tendencia',label:'📈 14 días'},{k:'productos',label:'🍔 Productos'},{k:'semanal',label:'📅 Semanal'},{k:'costos',label:'💰 Nómina'}];

  const estadoColor={EXCELENTE:'#4ade80',CUMPLIDO:'#86efac',CERCA:'#fbbf24',undefined:'#f87171','BAJO META':'#f87171'};
  const estadoBg={EXCELENTE:'#14532d',CUMPLIDO:'#1a3a1a',CERCA:'#451a03',undefined:'#3b0000','BAJO META':'#3b0000'};

  // Agrupar tendencia por fecha para el chart simple
  const tendenciaPorFecha=useMemo(()=>{
    const m={};
    tendencia.forEach(r=>{if(!m[r.fecha])m[r.fecha]=0;m[r.fecha]+=n(r.ventas_totales);});
    return Object.entries(m).map(([f,v])=>({fecha:f,total:v})).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  },[tendencia]);
  const maxTendencia=useMemo(()=>Math.max(...tendenciaPorFecha.map(x=>x.total),1),[tendenciaPorFecha]);

  // Patrón semanal: admin usa vista global, gerente lo computa desde sus tendencias
  const semanalData=useMemo(()=>{
    if(isAdmin) return semanal;
    if(!tendencia.length) return [];
    const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const byDow={};
    tendencia.forEach(r=>{
      const dow=new Date(r.fecha+'T12:00:00').getDay();
      if(!byDow[dow]) byDow[dow]={dia_num:dow,dia_semana:DIAS[dow],vals:[]};
      byDow[dow].vals.push(n(r.ventas_totales));
    });
    return Object.values(byDow).map(d=>({
      dia_num:d.dia_num, dia_semana:d.dia_semana,
      semanas_con_datos:d.vals.length,
      venta_promedio:(d.vals.reduce((a,b)=>a+b,0)/d.vals.length).toFixed(2),
      venta_minima:Math.min(...d.vals).toFixed(2),
      venta_maxima:Math.max(...d.vals).toFixed(2),
      ticket_promedio:null
    })).sort((a,b)=>a.dia_num-b.dia_num);
  },[isAdmin,semanal,tendencia]);
  const maxSemanal=useMemo(()=>Math.max(...semanalData.map(x=>n(x.venta_promedio)),1),[semanalData]);

  return(
    <div style={{minHeight:'100vh',padding:'0 0 40px'}}>
      <Toast/>
      {/* Header */}
      <div style={{padding:'20px 16px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #1a1a1a'}}>
        <div>
          <button onClick={onBack} style={{background:'none',border:'none',color:'#4ade80',fontSize:13,cursor:'pointer',padding:0,marginBottom:4}}>← Volver</button>
          <div style={{fontWeight:800,fontSize:18}}>Analytics de Ventas</div>
          {!isAdmin&&miSucursal&&<div style={{fontSize:12,color:'#4ade80',marginTop:2}}>📍 {miSucursal.nombre}</div>}
          {!isAdmin&&!miSucursal&&!loading&&<div style={{fontSize:12,color:'#f87171',marginTop:2}}>⚠️ Sin sucursal mapeada</div>}
        </div>
        <div style={{fontSize:11,color:'#555',textAlign:'right'}}>{isAdmin?'Todas las sucursales':'Tu sucursal'}<br/>QUANTO</div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',overflowX:'auto',borderBottom:'1px solid #1a1a1a',padding:'0 8px'}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{background:'none',border:'none',color:tab===t.k?'#4ade80':'#555',padding:'10px 10px',fontSize:12,cursor:'pointer',whiteSpace:'nowrap',borderBottom:tab===t.k?'2px solid #4ade80':'2px solid transparent',fontWeight:tab===t.k?700:400}}>
            {t.label}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:'center',padding:40}}><div className="spin" style={{width:32,height:32,margin:'0 auto'}}/></div>}

      {/* TAB: HOY — Performance vs Meta */}
      {!loading&&tab==='hoy'&&(
        <div style={{padding:'16px'}}>
          <div style={{fontSize:12,color:'#555',marginBottom:12}}>Últimos días con datos · vs metas configuradas</div>
          {perf.length===0&&<div style={{textAlign:'center',color:'#555',padding:20}}>Sin datos. Verifica que existan metas en metas_ventas.</div>}
          {perf.map((r,i)=>(
            <div key={i} className="card" style={{marginBottom:10,borderColor:estadoColor[r.estado]||'#222',background:estadoBg[r.estado]||'#161616'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontWeight:700,fontSize:14}}>{r.sucursal}</span>
                <span style={{fontSize:11,color:estadoColor[r.estado]||'#f87171',fontWeight:700,background:'rgba(0,0,0,0.3)',padding:'2px 7px',borderRadius:6}}>{r.estado||'SIN META'}</span>
              </div>
              <div style={{fontSize:11,color:'#888',marginBottom:6}}>{r.fecha}</div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Ventas reales</span><span style={{fontWeight:700}}>{fmt$(r.ventas_reales)}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Meta diaria</span><span style={{fontWeight:600}}>{r.meta_diaria?fmt$(r.meta_diaria):'—'}</span></div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Cumplimiento</span><span style={{fontWeight:700,color:estadoColor[r.estado]||'#f87171'}}>{r.pct_cumplimiento!=null?`${r.pct_cumplimiento}%`:'—'}</span></div>
              {/* Barra de progreso */}
              {r.meta_diaria&&<div style={{marginTop:8,background:'#222',borderRadius:4,height:6}}>
                <div style={{height:6,borderRadius:4,background:estadoColor[r.estado]||'#f87171',width:`${Math.min(100,n(r.pct_cumplimiento))}%`,transition:'width 0.5s'}}/>
              </div>}
            </div>
          ))}
        </div>
      )}

      {/* TAB: TENDENCIA 14 días */}
      {!loading&&tab==='tendencia'&&(
        <div style={{padding:'16px'}}>
          <div style={{fontSize:12,color:'#555',marginBottom:12}}>Ventas totales por día (todas las sucursales)</div>
          {tendenciaPorFecha.map((d,i)=>(
            <div key={i} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:12,color:'#888'}}>{new Date(d.fecha+'T12:00:00').toLocaleDateString('es-SV',{weekday:'short',day:'numeric',month:'short'})}</span>
                <span style={{fontSize:13,fontWeight:700}}>{fmt$(d.total)}</span>
              </div>
              <div style={{background:'#222',borderRadius:3,height:8}}>
                <div style={{height:8,borderRadius:3,background:'#4ade80',width:`${(d.total/maxTendencia*100).toFixed(1)}%`,transition:'width 0.5s'}}/>
              </div>
            </div>
          ))}
          {tendenciaPorFecha.length===0&&<div style={{textAlign:'center',color:'#555',padding:20}}>Sin datos recientes</div>}
        </div>
      )}

      {/* TAB: TOP PRODUCTOS */}
      {!loading&&tab==='productos'&&(
        <div style={{padding:'16px'}}>
          <div style={{fontSize:12,color:'#555',marginBottom:12}}>Ranking por ingresos totales · todos los tiempos</div>
          {productos.map((p,i)=>(
            <div key={i} className="card" style={{marginBottom:8,padding:'10px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1,marginRight:8}}>
                  <span style={{fontSize:12,color:'#4ade80',fontWeight:700,marginRight:6}}>#{i+1}</span>
                  <span style={{fontSize:13,fontWeight:600}}>{p.producto}</span>
                  {p.categoria&&<span style={{marginLeft:6,fontSize:10,color:'#555',background:'#1a1a1a',padding:'1px 5px',borderRadius:4}}>{p.categoria}</span>}
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontWeight:700,fontSize:13}}>{fmt$(p.revenue_total)}</div>
                  <div style={{fontSize:11,color:'#555'}}>{p.unidades_totales} uds · {fmt$(p.precio_promedio)} c/u</div>
                </div>
              </div>
            </div>
          ))}
          {productos.length===0&&<div style={{textAlign:'center',color:'#555',padding:20}}>Sin datos de productos (requiere DTEs cargados)</div>}
        </div>
      )}

      {/* TAB: PATRÓN SEMANAL */}
      {!loading&&tab==='semanal'&&(
        <div style={{padding:'16px'}}>
          <div style={{fontSize:12,color:'#555',marginBottom:12}}>Promedio de ventas por día de la semana · últimas 8 semanas</div>
          {semanalData.map((d,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600,textTransform:'capitalize'}}>{(d.dia_semana||'').trim()}</span>
                <div style={{textAlign:'right'}}>
                  <span style={{fontSize:13,fontWeight:700}}>{fmt$(d.venta_promedio)}</span>
                  <span style={{fontSize:11,color:'#555',marginLeft:8}}>ticket {fmt$(d.ticket_promedio)}</span>
                </div>
              </div>
              <div style={{background:'#222',borderRadius:3,height:10}}>
                <div style={{height:10,borderRadius:3,background:n(d.venta_promedio)===n(maxSemanal)?'#4ade80':'#2a6049',width:`${(n(d.venta_promedio)/maxSemanal*100).toFixed(1)}%`,transition:'width 0.5s'}}/>
              </div>
              <div style={{fontSize:10,color:'#444',marginTop:2}}>{d.semanas_con_datos} semanas de datos · mín {fmt$(d.venta_minima)} — máx {fmt$(d.venta_maxima)}</div>
            </div>
          ))}
          {semanalData.length===0&&<div style={{textAlign:'center',color:'#555',padding:20}}>Sin datos suficientes aún</div>}
        </div>
      )}

      {/* TAB: COSTO LABORAL */}
      {!loading&&tab==='costos'&&(
        <div style={{padding:'16px'}}>
          <div style={{fontSize:12,color:'#555',marginBottom:12}}>% nómina / ventas por sucursal · mes actual vs anterior</div>
          {costos.map((c,i)=>{
            const pct=n(c.labor_cost_pct);
            const color=pct===0?'#555':pct<25?'#4ade80':pct<35?'#fbbf24':'#f87171';
            return(
              <div key={i} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:14}}>{c.sucursal}</span>
                  <span style={{fontSize:18,fontWeight:800,color}}>{c.labor_cost_pct!=null?`${c.labor_cost_pct}%`:'—'}</span>
                </div>
                <div style={{fontSize:11,color:'#555',marginBottom:6}}>{c.mes?new Date(c.mes).toLocaleDateString('es-SV',{month:'long',year:'numeric'}):'Sin ventas registradas'}</div>
                <div className="row"><span style={{color:'#888',fontSize:13}}>Nómina mensual</span><span style={{fontWeight:600}}>{fmt$(c.nomina_mensual)}</span></div>
                <div className="row"><span style={{color:'#888',fontSize:13}}>Ventas del mes</span><span style={{fontWeight:600}}>{c.ventas_mes?fmt$(c.ventas_mes):'—'}</span></div>
                <div className="row"><span style={{color:'#888',fontSize:13}}>Empleados activos</span><span style={{fontWeight:600}}>{c.num_empleados}</span></div>
              </div>
            );
          })}
          {costos.length===0&&<div style={{textAlign:'center',color:'#555',padding:20}}>Sin datos de nómina</div>}
          <div style={{marginTop:16,padding:'10px 14px',background:'#0a1a0a',borderRadius:10,border:'1px solid #1a3a1a',fontSize:12,color:'#555'}}>
            💡 Referencia: &lt;25% excelente · 25–35% normal · &gt;35% revisar costos
          </div>
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD EJECUTIVO ────────────────────────────────────────
function DashboardEjecutivo({user,onBack}){
  const [kpis,setKpis]=useState(null);
  const [tendencia,setTendencia]=useState([]);
  const [sucursales,setSucursales]=useState([]);
  const [comprasMes,setComprasMes]=useState(0);
  const [prestamos,setPrestamos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('resumen');

  const COLORES={'M001':'#4ade80','S001':'#60a5fa','S002':'#f472b6','S003':'#facc15','S004':'#fb923c'};
  const mesActual=new Date().toLocaleDateString('es-SV',{month:'long',year:'numeric'});

  useEffect(()=>{
    const load=async()=>{
      try{
        // 1. Ventas mes actual y hoy por sucursal
        const inicioMes=new Date(); inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
        const {data:vtMes}=await db.from('quanto_transacciones')
          .select('store_code,total,fecha')
          .gte('fecha',inicioMes.toISOString());

        // 2. Ventas tendencia últimos 14 días (todos)
        const d14=new Date(); d14.setDate(d14.getDate()-14); d14.setHours(0,0,0,0);
        const {data:vtTend}=await db.from('quanto_transacciones')
          .select('fecha,total')
          .gte('fecha',d14.toISOString())
          .order('fecha',{ascending:true});

        // 3. Compras del mes
        const mesStr=`${inicioMes.getFullYear()}-${String(inicioMes.getMonth()+1).padStart(2,'0')}-01`;
        const {data:comp}=await db.from('compras').select('total').gte('fecha_emision',mesStr);

        // 4. Préstamos
        const {data:prest}=await db.from('prestamos').select('institucion,monto,fecha').eq('activo',true).order('monto',{ascending:false});

        // Procesar ventas por sucursal este mes
        const porSuc={};
        const hoyStr=new Date().toLocaleDateString('en-CA',{timeZone:'America/El_Salvador'});
        let totalMes=0, totalHoy=0;
        (vtMes||[]).forEach(r=>{
          const sc=r.store_code;
          if(!porSuc[sc]) porSuc[sc]={mes:0,hoy:0};
          porSuc[sc].mes+=Number(r.total||0);
          const fStr=new Date(r.fecha).toLocaleDateString('en-CA',{timeZone:'America/El_Salvador'});
          if(fStr===hoyStr) porSuc[sc].hoy+=Number(r.total||0);
          totalMes+=Number(r.total||0);
          if(fStr===hoyStr) totalHoy+=Number(r.total||0);
        });

        // Procesar tendencia por día (total cadena)
        const tendMap={};
        (vtTend||[]).forEach(r=>{
          const d=new Date(r.fecha).toLocaleDateString('en-CA',{timeZone:'America/El_Salvador'});
          tendMap[d]=(tendMap[d]||0)+Number(r.total||0);
        });
        const tendArr=Object.entries(tendMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);

        // Ventas mes anterior (referencia)
        const totalCompras=(comp||[]).reduce((s,r)=>s+Number(r.total||0),0);

        // Ordenar sucursales por ventas mes
        const sucArr=Object.entries(porSuc)
          .map(([sc,v])=>({sc,nombre:STORES[sc]||sc,mes:v.mes,hoy:v.hoy,pct:totalMes>0?((v.mes/totalMes)*100).toFixed(1):0}))
          .sort((a,b)=>b.mes-a.mes);

        setKpis({totalMes,totalHoy,totalCompras});
        setTendencia(tendArr);
        setSucursales(sucArr);
        setComprasMes(totalCompras);
        setPrestamos(prest||[]);
      }catch(e){console.error(e);}
      setLoading(false);
    };
    load();
  },[]);

  const fmt$=v=>v==null?'—':'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  const totalPrest=prestamos.reduce((s,r)=>s+Number(r.monto||0),0);

  // Mini barchart SVG
  const MiniBar=({data})=>{
    if(!data.length) return null;
    const max=Math.max(...data.map(d=>d[1]));
    const W=300,H=60,bw=Math.floor(W/data.length)-2;
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
        {data.map(([dia,val],i)=>{
          const h=max>0?Math.max(2,(val/max)*(H-16)):2;
          const x=i*(bw+2);
          const y=H-h-12;
          const isLast=i===data.length-1;
          return(
            <g key={i}>
              <rect x={x} y={y} width={bw} height={h} rx={2}
                fill={isLast?'#4ade80':'#2a5a2a'} opacity={isLast?1:0.75}/>
              {i%3===0&&<text x={x+bw/2} y={H-1} textAnchor="middle" fontSize={8} fill="#444">
                {dia.slice(5)}
              </text>}
              {isLast&&<text x={x+bw/2} y={y-3} textAnchor="middle" fontSize={8} fill="#4ade80">
                {fmt$(val)}
              </text>}
            </g>
          );
        })}
      </svg>
    );
  };

  return(
    <div style={{minHeight:'100vh',background:'#0d0d0d'}}>
      {/* Header */}
      <div style={{padding:'20px 16px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #1a1a1a',background:'#111'}}>
        <div>
          <button onClick={onBack} style={{background:'none',border:'none',color:'#4ade80',fontSize:13,cursor:'pointer',padding:0,marginBottom:4}}>← Volver</button>
          <div style={{fontWeight:800,fontSize:18}}>🏆 Dashboard Ejecutivo</div>
          <div style={{fontSize:11,color:'#555',marginTop:2}}>
            {new Date().toLocaleDateString('es-SV',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
          </div>
        </div>
        <div style={{fontSize:10,color:'#333',textAlign:'right'}}>Solo<br/>Ejecutivos</div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid #1a1a1a',overflowX:'auto'}}>
        {[['resumen','📊 Resumen'],['sucursales','🏪 Sucursales'],['financiero','💰 Financiero']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{background:'none',border:'none',color:tab===k?'#4ade80':'#555',padding:'10px 14px',fontSize:12,
              cursor:'pointer',whiteSpace:'nowrap',borderBottom:tab===k?'2px solid #4ade80':'2px solid transparent',fontWeight:tab===k?700:400}}>
            {l}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:'center',padding:60}}><div className="spin" style={{width:36,height:36,margin:'0 auto'}}/></div>}

      {!loading&&tab==='resumen'&&(
        <div style={{padding:16}}>
          {/* KPI Cards */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div className="card" style={{textAlign:'center',borderColor:'#14532d',background:'#0a1a0a'}}>
              <div style={{fontSize:10,color:'#555',marginBottom:4}}>VENTAS MES</div>
              <div style={{fontSize:22,fontWeight:800,color:'#4ade80'}}>{fmt$(kpis?.totalMes)}</div>
              <div style={{fontSize:10,color:'#555',marginTop:2,textTransform:'capitalize'}}>{mesActual}</div>
            </div>
            <div className="card" style={{textAlign:'center',borderColor:'#1e3a5f',background:'#0a0f1a'}}>
              <div style={{fontSize:10,color:'#555',marginBottom:4}}>COMPRAS MES</div>
              <div style={{fontSize:22,fontWeight:800,color:'#60a5fa'}}>{fmt$(kpis?.totalCompras)}</div>
              <div style={{fontSize:10,color:'#555',marginTop:2}}>DTEs recibidos</div>
            </div>
            <div className="card" style={{textAlign:'center',borderColor:'#3d1a00',background:'#150a00',gridColumn:'1/-1'}}>
              <div style={{fontSize:10,color:'#555',marginBottom:4}}>DEUDA TOTAL</div>
              <div style={{fontSize:22,fontWeight:800,color:'#fb923c'}}>{fmt$(totalPrest)}</div>
              <div style={{fontSize:10,color:'#555',marginTop:2}}>{prestamos.length} prestamos activos</div>
            </div>
          </div>

          {/* Tendencia 14 días */}
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:12,color:'#4ade80',fontWeight:700,marginBottom:10}}>📈 Tendencia 14 días (cadena total)</div>
            <MiniBar data={tendencia}/>
            {tendencia.length>1&&(()=>{
              const vals=tendencia.map(d=>d[1]);
              const ult=vals[vals.length-1];
              const ant=vals[vals.length-2];
              const diff=ult-ant;
              const pct=ant>0?((diff/ant)*100).toFixed(1):0;
              return(
                <div style={{marginTop:8,fontSize:12,color:diff>=0?'#4ade80':'#f87171',textAlign:'right'}}>
                  {diff>=0?'▲':'▼'} {Math.abs(pct)}% vs día anterior
                </div>
              );
            })()}
          </div>

          {/* Top sucursales mini */}
          <div className="card">
            <div style={{fontSize:12,color:'#888',fontWeight:700,marginBottom:10}}>🏪 ESTE MES POR SUCURSAL</div>
            {sucursales.map((s,i)=>(
              <div key={s.sc} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <span style={{fontSize:12,color:COLORES[s.sc]||'#fff',fontWeight:600}}>{s.nombre||s.sc}</span>
                  <span style={{fontSize:12,fontWeight:700}}>{fmt$(s.mes)}</span>
                </div>
                <div style={{background:'#1a1a1a',borderRadius:4,height:5}}>
                  <div style={{height:5,borderRadius:4,background:COLORES[s.sc]||'#4ade80',width:`${s.pct}%`,transition:'width 0.5s'}}/>
                </div>
                <div style={{textAlign:'right',fontSize:10,color:'#555',marginTop:1}}>{s.pct}% del total</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {!loading&&tab==='sucursales'&&(
        <div style={{padding:16}}>
          {sucursales.map((s,i)=>(
            <div key={s.sc} className="card" style={{marginBottom:12,borderLeft:`3px solid ${COLORES[s.sc]||'#444'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:COLORES[s.sc]||'#fff'}}>{s.nombre||s.sc}</div>
                  <div style={{fontSize:10,color:'#555'}}>Código: {s.sc}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'#555'}}>Rango #{i+1}</div>
                  <div style={{fontSize:13,fontWeight:700,color:'#4ade80'}}>{s.pct}%</div>
                </div>
              </div>
              <div className="row"><span style={{color:'#888',fontSize:13}}>Ventas este mes</span><span style={{fontWeight:700,color:'#4ade80'}}>{fmt$(s.mes)}</span></div>
            </div>
          ))}
          <div style={{marginTop:8,padding:'10px 14px',background:'#0a1a0a',borderRadius:10,border:'1px solid #1a3a1a',fontSize:13}}>
            <div className="row" style={{marginBottom:0}}>
              <span style={{color:'#888'}}>Total cadena (mes)</span>
              <span style={{fontWeight:800,color:'#4ade80',fontSize:16}}>{fmt$(kpis?.totalMes)}</span>
            </div>
          </div>
        </div>
      )}

      {!loading&&tab==='financiero'&&(
        <div style={{padding:16}}>
          {/* Compras vs Ventas */}
          <div className="card" style={{marginBottom:12,borderColor:'#1e3a5f',background:'#0a0f1a'}}>
            <div style={{fontSize:12,color:'#60a5fa',fontWeight:700,marginBottom:8}}>📦 Compras (DTEs) este mes</div>
            <div style={{fontSize:28,fontWeight:800,color:'#60a5fa'}}>{fmt$(kpis?.totalCompras)}</div>
            {kpis?.totalMes>0&&(
              <div style={{marginTop:6,fontSize:12,color:'#555'}}>
                Ratio compras/ventas: <span style={{color:kpis.totalCompras/kpis.totalMes<0.35?'#4ade80':'#f87171',fontWeight:700}}>
                  {((kpis.totalCompras/kpis.totalMes)*100).toFixed(1)}%
                </span>
                <span style={{color:'#444',marginLeft:6}}>(ref: &lt;35%)</span>
              </div>
            )}
          </div>

          {/* Préstamos */}
          <div className="card" style={{marginBottom:12,borderColor:'#3d1a00',background:'#150a00'}}>
            <div style={{fontSize:12,color:'#fb923c',fontWeight:700,marginBottom:8}}>💳 Préstamos Activos</div>
            <div style={{fontSize:28,fontWeight:800,color:'#fb923c',marginBottom:12}}>{fmt$(totalPrest)}</div>
            {prestamos.map((p,i)=>(
              <div key={i} style={{borderTop:'1px solid #2a1500',paddingTop:8,marginTop:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:12,color:'#ccc'}}>{p.institucion}</span>
                  <span style={{fontSize:13,fontWeight:700,color:'#fb923c'}}>{fmt$(p.monto)}</span>
                </div>
                {p.fecha&&<div style={{fontSize:10,color:'#555',marginTop:2}}>{new Date(p.fecha).toLocaleDateString('es-SV',{year:'numeric',month:'short',day:'numeric'})}</div>}
              </div>
            ))}
          </div>

          {/* Info */}
          <div style={{padding:'10px 14px',background:'#111',borderRadius:10,border:'1px solid #222',fontSize:12,color:'#555'}}>
            💡 Datos en tiempo real desde Supabase. Ventas desde QUANTO. Compras desde DTEs Gmail.
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState('login');
  const [lastData,setLastData]=useState(null);
  const [editCierre,setEditCierre]=useState(null);
  const [wasEdit,setWasEdit]=useState(false);
  const [returnTo,setReturnTo]=useState('home'); // 'home' | 'admin'

  // Cajero/gerente: editar su propio cierre
  const handleEditCierre=(cierre)=>{
    setEditCierre(cierre);
    setReturnTo('home');
    setScreen('cierre');
  };

  // Admin: editar cierre desde dashboard
  const handleAdminEditCierre=(cierre)=>{
    setEditCierre(cierre);
    setReturnTo('admin');
    setScreen('cierre');
  };

  const handleBack=()=>{
    setEditCierre(null);
    setScreen(returnTo);
  };

  if(screen==='login'||!user)
    return <Login onLogin={u=>{setUser(u);setScreen('home');}}/>;
  if(screen==='home')
    return <Home user={user}
      onCierre={()=>{setEditCierre(null);setReturnTo('home');setScreen('cierre');}}
      onEditCierre={handleEditCierre}
      onDeposito={()=>setScreen('deposito')}
      onAdmin={()=>setScreen('admin')}
      onDashboard={()=>setScreen('analytics')}
      onEjecutivo={()=>setScreen('ejecutivo')}
      onReporte={(dest)=>setScreen(dest||'reporte')}
      onLogout={()=>{setUser(null);setScreen('login');}}/>;
  if(screen==='analytics')
    return <DashboardVentas user={user} onBack={()=>setScreen('home')}/>;
  if(screen==='ejecutivo')
    return <DashboardEjecutivo user={user} onBack={()=>setScreen('home')}/>;
  if(screen==='cierre')
    return <CierreForm user={user} existingCierre={editCierre}
      isAdminEdit={returnTo==='admin'}
      onBack={handleBack}
      onSuccess={d=>{setLastData(d);setWasEdit(!!editCierre);setEditCierre(null);setScreen('confirm');}}/>;
  if(screen==='deposito')
    return <Deposito user={user} onBack={()=>setScreen('home')}/>;
  if(screen==='reporte')
    return <ReporteForm user={user} onBack={()=>setScreen('home')}/>;
  if(screen==='admin')
    return <AdminView user={user} onEditCierre={handleAdminEditCierre} onBack={()=>setScreen('home')}/>;
  if(screen==='incidentes')
    return <IncidentesDash user={user} onBack={()=>setScreen('home')}/>;
  if(screen==='confirm')
    return <Confirm data={lastData} isEdit={wasEdit} user={user} onVolver={()=>setScreen(returnTo==='admin'?'admin':'home')}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
