// ── TOAST ────────────────────────────────────────────────────
function useToast(){
  const [msg,setMsg]=useState('');
  const show=useCallback(m=>{setMsg(m);setTimeout(()=>setMsg(''),3200)},[]);
  const Toast=()=>msg?<div className="toast">{msg}</div>:null;
  return {show,Toast};
}

// ── STATUS BADGE ─────────────────────────────────────────────
function Badge({estado}){
  const map={
    pendiente:{cls:'badge-yellow',label:'Pendiente'},
    en_proceso:{cls:'badge-blue',label:'En proceso'},
    completada:{cls:'badge-green',label:'Completada'},
    con_diferencias:{cls:'badge-orange',label:'Con diferencias'},
    borrador:{cls:'badge-gray',label:'Borrador'},
    enviada:{cls:'badge-yellow',label:'Enviada'},
    aprobada:{cls:'badge-green',label:'Aprobada'},
    despachado:{cls:'badge-blue',label:'Despachado'},
    recibido:{cls:'badge-green',label:'Recibido'},
    preparando:{cls:'badge-yellow',label:'Preparando'},

// ── LOGIN ────────────────────────────────────────────────────
function Login({onLogin}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const press=async(k)=>{
    if(k==='DEL'){setPin(p=>p.slice(0,-1));return;}
    const np=pin+k; setPin(np);
    if(np.length>=4){
      setLoading(true);
      const {data,error}=await db.from('usuarios_erp').select('*').eq('pin',np).eq('activo',true).maybeSingle();
      setLoading(false);
      if(error){setErr('Error: '+error.message);setPin('');return;}
      if(!data){setErr('PIN incorrecto');setPin('');return;}
      if(!['bodeguero','produccion','admin','compras'].includes(data.rol)){
        setErr('Este acceso es solo para almacén'); setPin(''); return;
      }
      onLogin(data);
    }
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 32px'}}>
      <div style={{fontSize:36,marginBottom:8}}>🏭</div>
      <div style={{fontWeight:800,fontSize:22,marginBottom:4}}>Freakie Dogs</div>
      <div style={{color:'#666',fontSize:14,marginBottom:32}}>Módulo Almacén</div>
      <div style={{display:'flex',gap:16,marginBottom:8}}>
        {[1,2,3,4].map(i=>(
          <div key={i} style={{width:14,height:14,borderRadius:'50%',background:pin.length>=i?'#e63946':'#2a2a2a',transition:'.15s'}}/>
        ))}
      </div>
      {err&&<div style={{color:'#e63946',fontSize:13,marginBottom:12,marginTop:8}}>{err}</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginTop:24,width:220}}>
        {['1','2','3','4','5','6','7','8','9','','0','DEL'].map(k=>(
          <button key={k||'sp'} onClick={()=>k&&press(k)} disabled={!k||loading}
            style={{height:60,borderRadius:12,border:'1px solid #2a2a2a',background:k==='DEL'?'#2a2a2a':'#1a1a1a',color:k==='DEL'?'#e63946':'#f0f0f0',fontSize:k==='DEL'?18:22,fontWeight:700,cursor:k?'pointer':'default',opacity:k?1:0}}>
            {loading&&k==='0'?<div className="spin" style={{width:20,height:20,margin:'0 auto'}}/>:k}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── RECEPCIÓN PROVEEDOR (Flujo A) ────────────────────────────
function RecepcionTab({user,show}){
  const [view,setView]=useState('lista'); // lista | detalle | nueva
  const [receps,setReceps]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [sucursales,setSucursales]=useState([]);

  const cargar=async()=>{
    setLoading(true);
    const {data}=await db.from('recepciones')
      .select('*')
      .in('estado',['pendiente','en_proceso'])
      .eq('tipo_recepcion','bodega')
      .order('created_at',{ascending:false});
    setReceps(data||[]);
    const {data:suc}=await db.from('sucursales').select('id,nombre,store_code').eq('activa',true);
    setSucursales(suc||[]);
    setLoading(false);
  };

  useEffect(()=>{cargar();},[]);

  if(view==='detalle'&&sel) return <RecepcionDetalle rec={sel} user={user} show={show} onBack={()=>{setSel(null);setView('lista');cargar();}} />;
  if(view==='nueva') return <NuevaRecepcion user={user} sucursales={sucursales} show={show} onBack={()=>{setView('lista');cargar();}}/>;

  return(
    <div style={{padding:'16px 16px 100px'}}>
      <button className="btn btn-red" style={{marginBottom:16}} onClick={()=>setView('nueva')}>
        + Nueva Recepción de Proveedor
      </button>

      <div className="sec-title">Pendientes de Confirmar</div>
      {loading&&<div style={{textAlign:'center',padding:20}}><div className="spin" style={{width:28,height:28,margin:'0 auto'}}/></div>}
      {!loading&&receps.length===0&&(
        <div className="empty"><div className="empty-icon">📦</div><div className="empty-text">No hay recepciones pendientes</div></div>
      )}
      {receps.map(r=>(
        <div key={r.id} className="card" style={{cursor:'pointer'}} onClick={()=>{setSel(r);setView('detalle');}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{r.proveedor||'Proveedor sin nombre'}</div>
              <div style={{color:'#666',fontSize:12,marginTop:2}}>{fmtDate(r.fecha)}</div>
            </div>
            <Badge estado={r.estado}/>
          </div>
          {r.notas&&<div style={{fontSize:13,color:'#888',marginTop:4}}>{r.notas}</div>}
          <div style={{marginTop:10,fontSize:13,color:'#e63946',fontWeight:600}}>Tap para confirmar →</div>
        </div>
      ))}
    </div>
  );
}

// ── NUEVO PROVEEDOR MODAL ────────────────────────────────────────
function NuevoProveedorModal({onSave,onClose}){
  const [nombre,setNombre]=useState('');
  const [telefono,setTelefono]=useState('');
  const [correo,setCorreo]=useState('');
  const [contacto,setContacto]=useState('');
  const [nit,setNit]=useState('');
  const [direccion,setDireccion]=useState('');
  const [loading,setLoading]=useState(false);

  const guardar=async()=>{
    if(!nombre.trim()){alert('Ingresa el nombre del proveedor');return;}
    setLoading(true);
    try{
      const {data,error}=await db.from('proveedores').insert({
        nombre:nombre.trim(),
        telefono:telefono.trim()||null,
        correo:correo.trim()||null,
        contacto:contacto.trim()||null,
        nit:nit.trim()||null,
        direccion:direccion.trim()||null,
        activo:true,
      }).select().single();
      if(error) throw error;
      onSave(data);
    }catch(e){
      alert('Error: '+e.message);
    }
    setLoading(false);
  };

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>+ Agregar Proveedor</div>
        <div className="field">
          <label>Nombre *</label>
          <input type="text" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre del proveedor"/>
        </div>
        <div className="field">
          <label>Teléfono</label>
          <input type="text" value={telefono} onChange={e=>setTelefono(e.target.value)} placeholder="Ej: 2501-5555"/>
        </div>
        <div className="field">
          <label>Correo</label>
          <input type="text" value={correo} onChange={e=>setCorreo(e.target.value)} placeholder="Ej: info@proveedor.com"/>
        </div>
        <div className="field">
          <label>Contacto</label>
          <input type="text" value={contacto} onChange={e=>setContacto(e.target.value)} placeholder="Nombre del contacto"/>
        </div>
        <div className="field">
          <label>NIT</label>
          <input type="text" value={nit} onChange={e=>setNit(e.target.value)} placeholder="NIT"/>
        </div>
        <div className="field">
          <label>Dirección</label>
          <input type="text" value={direccion} onChange={e=>setDireccion(e.target.value)} placeholder="Dirección física"/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={onClose} disabled={loading}>Cancelar</button>
          <button className="btn btn-green" onClick={guardar} disabled={loading}>
            {loading?'Guardando...':'✅ Guardar'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── NUEVA RECEPCIÓN ───────────────────────────────────────────
function NuevaRecepcion({user,sucursales,show,onBack}){
  const [proveedorId,setProveedorId]=useState(null);
  const [proveedorNombre,setProveedorNombre]=useState('');
  const [proveedorSearch,setProveedorSearch]=useState('');
  const [proveedores,setProveedores]=useState([]);
  const [showProvSearch,setShowProvSearch]=useState(false);
  const [showNewProvModal,setShowNewProvModal]=useState(false);
  const [productos,setProductos]=useState([]);
  const [showNewProdModal,setShowNewProdModal]=useState(false);
  const [notas,setNotas]=useState('');
  const [items,setItems]=useState([{prodId:null,prodNombre:'',desc:'',qty:'',precio:'',unidad:'unidad'}]);
  const [foto,setFoto]=useState(null);
  const [fotoUrl,setFotoUrl]=useState('');
  const [loading,setLoading]=useState(false);
  const fRef=useRef();
  const cmId=sucursales.find(s=>s.store_code==='CM001')?.id;

  // Cargar proveedores activos
  useEffect(()=>{
    db.from('proveedores').select('id,nombre').eq('activo',true).then(({data})=>setProveedores(data||[]));
  },[]);

  // Cargar productos del proveedor seleccionado
  useEffect(()=>{
    if(!proveedorId){setProductos([]);return;}
    db.from('proveedor_productos')
      .select('producto_id,precio_unitario,unidad_compra,catalogo_productos(id,codigo,nombre,categoria,unidad_medida,precio_referencia)')
      .eq('proveedor_id',proveedorId)
      .eq('activo',true)
      .then(({data})=>{
        const prods=(data||[]).map(pp=>({
          ...pp.catalogo_productos,
          precio_proveedor:pp.precio_unitario,
          unidad_compra:pp.unidad_compra
        })).filter(Boolean);
        setProductos(prods);
      });
  },[proveedorId]);

  const filteredProveedores=proveedorSearch.trim()
    ?proveedores.filter(p=>p.nombre.toLowerCase().includes(proveedorSearch.toLowerCase()))
    :proveedores;

  const selectProveedor=(p)=>{
    setProveedorId(p.id);
    setProveedorNombre(p.nombre);
    setProveedorSearch(p.nombre);
    setShowProvSearch(false);
    setItems([{prodId:null,prodNombre:'',desc:'',qty:'',precio:'',unidad:'unidad'}]);
  };

  const handleNewProveedor=(p)=>{
    selectProveedor(p);
    setProveedores(prev=>[...prev,p]);
    setShowNewProvModal(false);
  };

  const handleNewProducto=async(p)=>{
    // Vincular producto al proveedor actual en proveedor_productos
    if(proveedorId&&p.id){
      await db.from('proveedor_productos').upsert({
        proveedor_id:proveedorId,
        producto_id:p.id,
        precio_unitario:p.precio_referencia||null,
        unidad_compra:p.unidad_medida||'Unidad',
        es_proveedor_principal:true,
        activo:true
      },{onConflict:'proveedor_id,producto_id'});
    }
    setProductos(prev=>[...prev,{...p,precio_proveedor:p.precio_referencia}]);
    setShowNewProdModal(false);
  };

  const addItem=()=>setItems(prev=>[...prev,{prodId:null,prodNombre:'',desc:'',qty:'',precio:'',unidad:'unidad'}]);
  const updItem=(i,f,v)=>setItems(prev=>prev.map((it,idx)=>idx===i?{...it,[f]:v}:it));
  const delItem=(i)=>setItems(prev=>prev.filter((_,idx)=>idx!==i));

  const handleFoto=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFoto(f);
    const reader=new FileReader();
    reader.onload=ev=>setFotoUrl(ev.target.result);
    reader.readAsDataURL(f);
  };

  const getPriceAlert=(itemPrice,prodId)=>{
    if(!proveedorId||!itemPrice) return null;
    const prod=productos.find(p=>p.id===prodId);
    if(!prod) return null;
    const refPrice=n(prod.precio_referencia);
    const diff=(n(itemPrice)-refPrice)/refPrice*100;
    if(Math.abs(diff)>5){
      return `⚠️ Último precio: $${refPrice.toFixed(2)} — Diferencia: ${diff>0?'+':''}${diff.toFixed(1)}%`;
    }
    return null;
  };

  const guardar=async()=>{
    if(!proveedorId||!proveedorNombre.trim()){show('⚠️ Selecciona un proveedor');return;}
    const validItems=items.filter(i=>(i.prodId||i.desc.trim())&&n(i.qty)>0);
    if(validItems.length===0){show('⚠️ Agrega al menos un ítem con cantidad');return;}
    if(!cmId){show('⚠️ Casa Matriz no encontrada en BD');return;}
    setLoading(true);
    try{
      let fotoDbUrl=null;
      if(foto){
        const ext=(foto.name.split('.').pop()||'jpg').toLowerCase();
        const path=`recepciones/dte_${Date.now()}.${ext}`;
        const {error:upErr}=await db.storage.from(BUCKET).upload(path,foto,{cacheControl:'3600',upsert:false});
        if(!upErr){
          const {data:pu}=db.storage.from(BUCKET).getPublicUrl(path);
          fotoDbUrl=pu?.publicUrl;
        }
      }
      const {data:rec,error:recErr}=await db.from('recepciones').insert({
        fecha:today(),
        tipo_recepcion:'bodega_proveedor',
        sucursal_destino_id:cmId,
        proveedor:proveedorNombre.trim(),
        recibido_por:user.id,
        estado:'verificada',
        foto_dte_url:fotoDbUrl,
        notas:notas.trim()||null,
      }).select().single();
      if(recErr) throw recErr;

      const rows=validItems.map(it=>({
        recepcion_id:rec.id,
        producto_id:it.prodId||null,
        descripcion:it.prodId?productos.find(p=>p.id===it.prodId)?.nombre||it.desc:it.desc.trim(),
        cantidad_esperada:n(it.qty),
        cantidad_recibida:n(it.qty),
        unidad:it.unidad,
      }));
      const {error:itmErr}=await db.from('recepcion_items').insert(rows);
      if(itmErr) throw itmErr;

      // Auto-actualizar inventario para cada producto con ID
      for(const it of validItems){
        if(!it.prodId) continue;
        const qty=n(it.qty);
        // Intentar obtener registro existente
        const {data:existing}=await db.from('inventario')
          .select('id,stock_actual')
          .eq('producto_id',it.prodId).eq('sucursal_id',cmId).maybeSingle();
        if(existing){
          await db.from('inventario').update({
            stock_actual:n(existing.stock_actual)+qty,
            ultima_actualizacion:new Date().toISOString()
          }).eq('id',existing.id);
        }else{
          await db.from('inventario').insert({
            producto_id:it.prodId,
            sucursal_id:cmId,
            stock_actual:qty,
            stock_minimo:0,
            stock_maximo:999,
            ultima_actualizacion:new Date().toISOString()
          });
        }
      }
      show('✅ Recepción verificada e inventario actualizado');
      onBack();
    }catch(e){
      show('❌ Error: '+e.message);
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh'}}>
      <div className="header">
        <button className="back-btn" onClick={onBack}>←</button>
        <div style={{fontWeight:700,fontSize:16}}>Nueva Recepción</div>
      </div>
      <div style={{padding:'16px 16px 100px'}}>
        {/* Proveedor con autocomplete */}
        <div className="field">
          <label>Proveedor *</label>
          <div className="autocomplete-container">
            <input type="text" value={proveedorSearch} onChange={e=>{setProveedorSearch(e.target.value);setShowProvSearch(true);}}
              onFocus={()=>setShowProvSearch(true)} placeholder="Buscar proveedor..."/>
            {showProvSearch&&(
              <div className={`autocomplete-dropdown ${showProvSearch?'active':''}`}>
                {filteredProveedores.length>0?filteredProveedores.map(p=>(
                  <div key={p.id} className="autocomplete-item" onClick={()=>selectProveedor(p)}>
                    {p.nombre}
                  </div>
                )):<div style={{padding:'10px 12px',color:'#666'}}>Sin resultados</div>}
                <div className="autocomplete-item" style={{background:'#1b4332',color:'#4ade80',borderTop:'1px solid #222'}} onClick={()=>setShowNewProvModal(true)}>
                  + Agregar nuevo proveedor
                </div>
              </div>
            )}
          </div>
        </div>

        <div className="field">
          <label>Notas (opcional)</label>
          <input type="text" value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Observaciones generales"/>
        </div>

        {/* Foto DTE */}
        <div className="field">
          <label>Foto del DTE físico</label>
          <div className={`photo-btn ${foto?'has-photo':''}`} onClick={()=>fRef.current.click()}>
            {foto
              ? <><img src={fotoUrl} style={{width:120,height:90,objectFit:'cover',borderRadius:8}} alt="DTE"/><span style={{marginTop:4}}>✅ DTE adjunto — tap para cambiar</span></>
              : <><span style={{fontSize:28}}>📷</span><span>Tomar foto del DTE</span></>
            }
          </div>
          <input type="file" ref={fRef} accept="image/*" capture="environment" onChange={handleFoto} style={{display:'none'}}/>
        </div>

        {/* Items */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div className="sec-title" style={{marginBottom:0}}>PRODUCTOS RECIBIDOS</div>
          <button className="btn btn-ghost btn-sm" onClick={addItem}>+ Agregar</button>
        </div>

        {items.map((it,i)=>(
          <div key={i} className="item-row">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:13,color:'#666'}}>Producto {i+1}</span>
              {items.length>1&&<button onClick={()=>delItem(i)} style={{background:'none',border:'none',color:'#e63946',fontSize:18,cursor:'pointer'}}>×</button>}
            </div>
            <div className="field" style={{marginBottom:8}}>
              <label style={{fontSize:12}}>Producto</label>
              <input type="text" value={it.prodNombre} onChange={e=>updItem(i,'prodNombre',e.target.value)}
                onFocus={()=>{if(proveedorId)updItem(i,'searchOpen',true);}}
                placeholder={proveedorId?'Buscar producto...':'⬆️ Selecciona proveedor primero'}
                disabled={!proveedorId}
                style={!proveedorId?{opacity:0.5,cursor:'not-allowed'}:{}}/>
              {it.searchOpen&&proveedorId&&(
                <div style={{background:'#1e1e1e',border:'1px solid #333',borderTop:'none',maxHeight:180,overflowY:'auto',borderRadius:'0 0 8px 8px',marginTop:-4}}>
                  {productos.filter(p=>p.nombre.toLowerCase().includes((it.prodNombre||'').toLowerCase())).slice(0,8).map(p=>(
                    <div key={p.id} style={{padding:'8px 12px',borderBottom:'1px solid #222',cursor:'pointer',fontSize:13,color:'#f0f0f0',display:'flex',justifyContent:'space-between'}}
                      onClick={()=>{updItem(i,'prodId',p.id);updItem(i,'prodNombre',p.nombre);updItem(i,'unidad',p.unidad_compra||p.unidad_medida||'unidad');updItem(i,'precio',p.precio_proveedor||p.precio_referencia||'');updItem(i,'searchOpen',false);}}>
                      <span>{p.nombre}</span>
                      {p.precio_proveedor&&<span style={{color:'#4ade80',fontSize:11}}>${Number(p.precio_proveedor).toFixed(2)}</span>}
                    </div>
                  ))}
                  {productos.filter(p=>p.nombre.toLowerCase().includes((it.prodNombre||'').toLowerCase())).length===0&&(
                    <div style={{padding:'10px 12px',color:'#666',fontSize:13}}>No hay productos de este proveedor</div>
                  )}
                  <div className="autocomplete-item" style={{background:'#1b4332',color:'#4ade80',borderTop:'1px solid #222'}} onClick={()=>setShowNewProdModal(true)}>
                    + Nuevo Producto
                  </div>
                </div>
              )}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div>
                <label>Cantidad</label>
                <input type="number" value={it.qty} onChange={e=>updItem(i,'qty',e.target.value)} placeholder="0" min="0" step="0.01"/>
              </div>
              <div>
                <label>Unidad</label>
                <select value={it.unidad} onChange={e=>updItem(i,'unidad',e.target.value)}>
                  <option value="unidad">Unidad</option>
                  <option value="kg">Kilogramo</option>
                  <option value="lb">Libra</option>
                  <option value="litro">Litro</option>
                  <option value="caja">Caja</option>
                  <option value="bolsa">Bolsa</option>
                  <option value="rollo">Rollo</option>
                  <option value="paquete">Paquete</option>
                  <option value="galón">Galón</option>
                </select>
              </div>
            </div>
            <div className="field" style={{marginTop:8,marginBottom:0}}>
              <label>Precio unitario</label>
              <input type="number" value={it.precio} onChange={e=>updItem(i,'precio',e.target.value)} placeholder="0.00" min="0" step="0.01"/>
              {getPriceAlert(it.precio,it.prodId)&&<div className="price-alert">{getPriceAlert(it.precio,it.prodId)}</div>}
            </div>
          </div>
        ))}

        <button className="btn btn-green" style={{marginTop:8}} onClick={guardar} disabled={loading}>
          {loading?'Guardando...':'✅ Confirmar Recepción'}
        </button>
      </div>

      {showNewProvModal&&<NuevoProveedorModal onSave={handleNewProveedor} onClose={()=>setShowNewProvModal(false)}/>}
      {showNewProdModal&&<NuevoProductoModal onSave={handleNewProducto} onClose={()=>setShowNewProdModal(false)}/>}
    </div>
  );
}

// ── DETALLE RECEPCIÓN (editar/confirmar) ──────────────────────
function RecepcionDetalle({rec,user,show,onBack}){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [foto,setFoto]=useState(null);
  const [fotoUrl,setFotoUrl]=useState(rec.foto_dte_url||'');
  const fRef=useRef();

  useEffect(()=>{
    db.from('recepcion_items').select('*').eq('recepcion_id',rec.id)
      .then(({data})=>{ setItems((data||[]).map(it=>({...it,qty_input:String(it.cantidad_recibida)}))); setLoading(false); });
  },[rec.id]);

  const handleFoto=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFoto(f);
    const reader=new FileReader(); reader.onload=ev=>setFotoUrl(ev.target.result); reader.readAsDataURL(f);
  };

  const confirmar=async()=>{
    setSaving(true);
    try{
      let fotoDbUrl=rec.foto_dte_url;
      if(foto){
        const ext=(foto.name.split('.').pop()||'jpg').toLowerCase();
        const path=`recepciones/dte_${Date.now()}.${ext}`;
        const {error:upErr}=await db.storage.from(BUCKET).upload(path,foto,{cacheControl:'3600',upsert:false});
        if(!upErr){const {data:pu}=db.storage.from(BUCKET).getPublicUrl(path); fotoDbUrl=pu?.publicUrl;}
      }
      // Actualizar items
      for(const it of items){
        await db.from('recepcion_items').update({cantidad_recibida:n(it.qty_input)}).eq('id',it.id);
      }
      // Actualizar recepción
      const hasDiff=items.some(it=>Math.abs(n(it.qty_input)-n(it.cantidad_esperada))>0.01);
      await db.from('recepciones').update({
        estado:hasDiff?'con_diferencias':'completada',
        foto_dte_url:fotoDbUrl,
        updated_at:new Date().toISOString(),
      }).eq('id',rec.id);

      // Actualizar inventario (upsert stock Casa Matriz)
      const cmId=rec.sucursal_destino_id;
      for(const it of items){
        if(it.producto_id){
          await db.from('inventario').upsert({
            sucursal_id:cmId, producto_id:it.producto_id,
            stock_actual:n(it.qty_input), ultima_actualizacion:new Date().toISOString()
          },{onConflict:'sucursal_id,producto_id',ignoreDuplicates:false});
        }
      }
      show(hasDiff?'⚠️ Recepción confirmada con diferencias':'✅ Recepción completada');
      onBack();
    }catch(e){ show('❌ '+e.message); }
    setSaving(false);
  };

  return(
    <div style={{minHeight:'100vh'}}>
      <div className="header">
        <button className="back-btn" onClick={onBack}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>{rec.proveedor||'Proveedor'}</div>
          <div style={{fontSize:12,color:'#666'}}>{fmtDate(rec.fecha)}</div>
        </div>
        <Badge estado={rec.estado}/>
      </div>
      <div style={{padding:'16px 16px 100px'}}>
        {/* Foto DTE */}
        <div className="field">
          <label>Foto del DTE</label>
          <div className={`photo-btn ${fotoUrl?'has-photo':''}`} onClick={()=>fRef.current.click()}>
            {fotoUrl
              ? <><img src={fotoUrl} style={{width:120,height:90,objectFit:'cover',borderRadius:8}} alt="DTE"/><span style={{marginTop:4}}>✅ Tap para reemplazar</span></>
              : <><span style={{fontSize:28}}>📷</span><span>Sin foto — tap para agregar</span></>
            }
          </div>
          <input type="file" ref={fRef} accept="image/*" capture="environment" onChange={handleFoto} style={{display:'none'}}/>
        </div>

        <div className="sec-title">CONFIRMAR CANTIDADES RECIBIDAS</div>
        {loading&&<div className="spin" style={{width:28,height:28,margin:'20px auto'}}/>}
        {items.map((it,i)=>(
          <div key={it.id} className="item-row">
            <div style={{fontWeight:600,fontSize:14,marginBottom:8}}>{it.descripcion||`Ítem ${i+1}`}</div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#666',marginBottom:10}}>
              <span>Esperado: <strong style={{color:'#f0f0f0'}}>{it.cantidad_esperada} {it.unidad||''}</strong></span>
            </div>
            <div>
              <label>Cantidad recibida</label>
              <div className="num-input">
                <button className="num-btn" onClick={()=>{const v=Math.max(0,n(it.qty_input)-1);setItems(p=>p.map((x,j)=>j===i?{...x,qty_input:String(v)}:x));}}>−</button>
                <input type="number" className="num-field" value={it.qty_input}
                  onChange={e=>setItems(p=>p.map((x,j)=>j===i?{...x,qty_input:e.target.value}:x))} min="0" step="0.01"/>
                <button className="num-btn" onClick={()=>{const v=n(it.qty_input)+1;setItems(p=>p.map((x,j)=>j===i?{...x,qty_input:String(v)}:x));}}>+</button>
              </div>
              {Math.abs(n(it.qty_input)-n(it.cantidad_esperada))>0.01&&(
                <div style={{fontSize:12,color:'#fb923c',marginTop:4}}>
                  ⚠️ Diferencia: {(n(it.qty_input)-n(it.cantidad_esperada)).toFixed(2)} {it.unidad}
                </div>
              )}
            </div>
          </div>
        ))}

        {!loading&&<button className="btn btn-green" style={{marginTop:12}} onClick={confirmar} disabled={saving}>
          {saving?'Confirmando...':'✅ Confirmar Recepción'}
        </button>}
      </div>
    </div>
  );
}

// ── DESPACHO A SUCURSALES (Flujo C) ──────────────────────────
function DespachoTab({user,show}){
  const [view,setView]=useState('lista');
  const [pedidos,setPedidos]=useState([]);
  const [despachos,setDespachos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState('pendientes'); // pendientes | despachados

  const cargar=async()=>{
    setLoading(true);
    const [{data:ped},{data:des}]=await Promise.all([
      db.from('pedidos_sucursal').select('*,sucursales(nombre)').in('estado',['enviado','aprobado']).order('created_at',{ascending:false}),
      db.from('despachos_sucursal').select('*,sucursales(nombre)').in('estado',['despachado','en_camino']).order('fecha_despacho',{ascending:false}).limit(20),
    ]);
    setPedidos(ped||[]);
    setDespachos(des||[]);
    setLoading(false);
  };

  useEffect(()=>{cargar();},[]);

  if(view==='preparar'&&sel) return <PrepararDespacho pedido={sel} user={user} show={show} onBack={()=>{setSel(null);setView('lista');cargar();}}/>;

  return(
    <div style={{padding:'16px 16px 100px'}}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button className={`btn btn-sm ${tab==='pendientes'?'btn-red':'btn-ghost'}`} onClick={()=>setTab('pendientes')}>📋 Pedidos</button>
        <button className={`btn btn-sm ${tab==='despachados'?'btn-red':'btn-ghost'}`} onClick={()=>setTab('despachados')}>🚚 En camino</button>
      </div>
      {loading&&<div className="spin" style={{width:28,height:28,margin:'20px auto'}}/>}

      {!loading&&tab==='pendientes'&&<>
        {pedidos.length===0&&<div className="empty"><div className="empty-icon">🛒</div><div className="empty-text">No hay pedidos pendientes de despacho</div></div>}
        {pedidos.map(p=>(
          <div key={p.id} className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{p.sucursales?.nombre||p.sucursal_id}</div>
                <div style={{color:'#666',fontSize:12,marginTop:2}}>Pedido: {fmtDate(p.fecha_pedido)}</div>
                {p.fecha_entrega_estimada&&<div style={{color:'#fbbf24',fontSize:12}}>Entrega: {fmtDate(p.fecha_entrega_estimada)}</div>}
              </div>
              <Badge estado={p.estado}/>
            </div>
            {p.notas&&<div style={{fontSize:13,color:'#888',marginBottom:8}}>{p.notas}</div>}
            <button className="btn btn-orange btn-sm" onClick={()=>{setSel(p);setView('preparar');}}>
              📦 Preparar Despacho
            </button>
          </div>
        ))}
      </>}

      {!loading&&tab==='despachados'&&<>
        {despachos.length===0&&<div className="empty"><div className="empty-icon">🚚</div><div className="empty-text">No hay despachos en camino</div></div>}
        {despachos.map(d=>(
          <div key={d.id} className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:700}}>{d.sucursales?.nombre}</div>
                <div style={{color:'#666',fontSize:12}}>{fmtDate(d.fecha_despacho)}</div>
              </div>
              <Badge estado={d.estado}/>
            </div>
          </div>
        ))}
      </>}
    </div>
  );
}

// ── PREPARAR DESPACHO ─────────────────────────────────────────
function PrepararDespacho({pedido,user,show,onBack}){
  const [pitems,setPitems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const cmId=null; // will be set after loading sucursales

  useEffect(()=>{
    db.from('pedido_items').select('*,catalogo_productos(nombre,unidad_medida)').eq('pedido_id',pedido.id)
      .then(({data})=>{
        setPitems((data||[]).map(it=>({...it,qty_despacho:String(it.cantidad_solicitada||0)})));
        setLoading(false);
      });
  },[pedido.id]);

  const despachar=async()=>{
    setSaving(true);
    try{
      // 1. Crear despacho
      const {data:des,error:desErr}=await db.from('despachos_sucursal').insert({
        sucursal_id:pedido.sucursal_id,
        pedido_id:pedido.id,
        fecha_despacho:today(),
        estado:'despachado',
        preparado_por:user.id,
      }).select().single();
      if(desErr) throw desErr;
      // 2. Crear despacho_items
      const rows=pitems.filter(it=>n(it.qty_despacho)>0).map(it=>({
        despacho_id:des.id,
        producto_id:it.producto_id||null,
        descripcion:it.catalogo_productos?.nombre||`Producto`,
        cantidad_despachada:n(it.qty_despacho),
        unidad_medida:it.catalogo_productos?.unidad_medida||it.unidad||'unidad',
      }));
      if(rows.length>0){
        const {error:itmErr}=await db.from('despacho_items').insert(rows);
        if(itmErr) throw itmErr;
      }
      // 3. Actualizar pedido a despachado
      await db.from('pedidos_sucursal').update({estado:'despachado'}).eq('id',pedido.id);
      show('✅ Despacho confirmado — en camino a '+pedido.sucursales?.nombre);
      onBack();
    }catch(e){ show('❌ '+e.message); }
    setSaving(false);
  };

  return(
    <div style={{minHeight:'100vh'}}>
      <div className="header">
        <button className="back-btn" onClick={onBack}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>Despacho a {pedido.sucursales?.nombre}</div>
          <div style={{fontSize:12,color:'#666'}}>Pedido del {fmtDate(pedido.fecha_pedido)}</div>
        </div>
      </div>
      <div style={{padding:'16px 16px 100px'}}>
        <div className="sec-title">ÍTEMS A DESPACHAR</div>
        {loading&&<div className="spin" style={{width:28,height:28,margin:'20px auto'}}/>}
        {!loading&&pitems.length===0&&<div className="empty"><div className="empty-icon">📋</div><div className="empty-text">Este pedido no tiene ítems</div></div>}
        {pitems.map((it,i)=>(
          <div key={it.id} className="item-row">
            <div style={{fontWeight:600,fontSize:14,marginBottom:8}}>
              {it.catalogo_productos?.nombre||`Ítem ${i+1}`}
            </div>
            <div style={{fontSize:12,color:'#666',marginBottom:10}}>
              Solicitado: <strong style={{color:'#f0f0f0'}}>{it.cantidad_solicitada} {it.catalogo_productos?.unidad_medida||it.unidad||''}</strong>
            </div>
            <div>
              <label>Cantidad a despachar</label>
              <div className="num-input">
                <button className="num-btn" onClick={()=>{const v=Math.max(0,n(it.qty_despacho)-1);setPitems(p=>p.map((x,j)=>j===i?{...x,qty_despacho:String(v)}:x));}}>−</button>
                <input type="number" className="num-field" value={it.qty_despacho}
                  onChange={e=>setPitems(p=>p.map((x,j)=>j===i?{...x,qty_despacho:e.target.value}:x))} min="0" step="0.01"/>
                <button className="num-btn" onClick={()=>{const v=n(it.qty_despacho)+1;setPitems(p=>p.map((x,j)=>j===i?{...x,qty_despacho:String(v)}:x));}}>+</button>
              </div>
            </div>
          </div>
        ))}
        {!loading&&<>
          {pitems.length>0&&<button className="btn btn-orange" style={{marginTop:12}} onClick={despachar} disabled={saving}>
            {saving?'Despachando...':'🚚 Confirmar Despacho'}
          </button>}
        </>}
      </div>
    </div>
  );
}

// ── INVENTARIO ───────────────────────────────────────────────
function InventarioTab({user,show}){
  const [inv,setInv]=useState([]);
  const [loading,setLoading]=useState(true);
  const [busqueda,setBusqueda]=useState('');
  const [cmId,setCmId]=useState(null);

  useEffect(()=>{
    db.from('sucursales').select('id').eq('store_code','CM001').maybeSingle().then(({data})=>{
      if(!data) return;
      setCmId(data.id);
      db.from('inventario').select('*,catalogo_productos(nombre,categoria,unidad_medida)')
        .eq('sucursal_id',data.id).order('stock_actual',{ascending:true})
        .then(({data:inv})=>{ setInv(inv||[]); setLoading(false); });
    });
  },[]);

  const filtrado=useMemo(()=>{
    if(!busqueda.trim()) return inv;
    const q=busqueda.toLowerCase();
    return inv.filter(i=>i.catalogo_productos?.nombre?.toLowerCase().includes(q)||i.catalogo_productos?.categoria?.toLowerCase().includes(q));
  },[inv,busqueda]);

  const alertas=inv.filter(i=>i.alerta_activa||i.stock_actual<=i.stock_minimo);

  return(
    <div style={{padding:'16px 16px 100px'}}>
      {alertas.length>0&&(
        <div className="card" style={{borderColor:'#7c2d12',marginBottom:16}}>
          <div style={{fontWeight:700,color:'#fb923c',marginBottom:6}}>⚠️ {alertas.length} producto(s) bajo mínimo</div>
          {alertas.map(a=>(
            <div key={a.id} style={{fontSize:13,color:'#f0f0f0',padding:'4px 0',borderBottom:'1px solid #2a2a2a'}}>
              {a.catalogo_productos?.nombre||a.id}: <strong>{a.stock_actual}</strong> / mín {a.stock_minimo}
            </div>
          ))}
        </div>
      )}
      <div className="field">
        <input type="text" value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="🔍 Buscar producto..."/>
      </div>
      {loading&&<div className="spin" style={{width:28,height:28,margin:'20px auto'}}/>}
      {!loading&&filtrado.length===0&&(
        <div className="empty">
          <div className="empty-icon">📦</div>
          <div className="empty-text">{busqueda?'Sin resultados':'Inventario vacío — carga mercadería primero'}</div>
        </div>
      )}
      {filtrado.map(it=>(
        <div key={it.id} className="card" style={{padding:'12px 14px',borderColor:it.stock_actual<=it.stock_minimo?'#7c2d12':'#2a2a2a'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{it.catalogo_productos?.nombre||it.id}</div>
              <div style={{fontSize:12,color:'#666',marginTop:2}}>{it.catalogo_productos?.categoria||'Sin categoría'}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:700,fontSize:18,color:it.stock_actual<=it.stock_minimo?'#fb923c':'#4ade80'}}>
                {it.stock_actual}
              </div>
              <div style={{fontSize:11,color:'#555'}}>{it.catalogo_productos?.unidad_medida||'unid'}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:16,marginTop:8,fontSize:12,color:'#555'}}>
            <span>Mín: {it.stock_minimo}</span>
            <span>Máx: {it.stock_maximo}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── HISTORIAL DE RECEPCIONES ──────────────────────────────────
function HistorialTab({user,show}){
  const [recs,setRecs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [expandedId,setExpandedId]=useState(null);
  const [items,setItems]=useState([]);
  const [loadingItems,setLoadingItems]=useState(false);
  const [saving,setSaving]=useState(false);
  const [cmId,setCmId]=useState(null);

  const cargar=()=>{
    db.from('recepciones').select('*')
      .order('created_at',{ascending:false}).limit(30)
      .then(({data})=>{setRecs(data||[]);setLoading(false);});
  };
  useEffect(()=>{
    cargar();
    db.from('sucursales').select('id').eq('store_code','CM001').maybeSingle().then(({data})=>{if(data)setCmId(data.id);});
  },[]);

  const horasDesde=(d)=>(Date.now()-new Date(d).getTime())/3600000;
  const esEditable=(r)=>horasDesde(r.created_at)<72;

  const toggleExpand=async(recId)=>{
    if(expandedId===recId){setExpandedId(null);return;}
    setExpandedId(recId);
    setLoadingItems(true);
    const {data}=await db.from('recepcion_items').select('*').eq('recepcion_id',recId);
    setItems((data||[]).map(it=>({...it,qty_edit:String(it.cantidad_recibida)})));
    setLoadingItems(false);
  };

  const updItem=(idx,val)=>setItems(prev=>prev.map((it,i)=>i===idx?{...it,qty_edit:val}:it));

  const guardarCambios=async(rec)=>{
    setSaving(true);
    try{
      for(const it of items){
        const newQty=parseFloat(it.qty_edit)||0;
        const oldQty=parseFloat(it.cantidad_recibida)||0;
        const diff=newQty-oldQty;
        if(diff===0) continue;
        // Actualizar recepcion_item
        await db.from('recepcion_items').update({cantidad_recibida:newQty}).eq('id',it.id);
        // Ajustar inventario
        if(it.producto_id&&cmId){
          const {data:inv}=await db.from('inventario').select('id,stock_actual')
            .eq('producto_id',it.producto_id).eq('sucursal_id',cmId).maybeSingle();
          if(inv){
            await db.from('inventario').update({
              stock_actual:parseFloat(inv.stock_actual)+diff,
              ultima_actualizacion:new Date().toISOString()
            }).eq('id',inv.id);
          }
        }
      }
      show('✅ Recepción corregida');
      setExpandedId(null);
      cargar();
    }catch(e){show('❌ '+e.message);}
    setSaving(false);
  };

  return(
    <div style={{padding:'16px 16px 100px'}}>
      <div className="sec-title">Últimas recepciones</div>
      {loading&&<div className="spin" style={{width:28,height:28,margin:'20px auto'}}/>}
      {!loading&&recs.length===0&&<div className="empty"><div className="empty-icon">📋</div><div className="empty-text">Sin historial aún</div></div>}
      {recs.map(r=>{
        const editable=esEditable(r);
        const horas=Math.round(72-horasDesde(r.created_at));
        return(
        <div key={r.id} className="card" style={{padding:'12px 14px',cursor:'pointer'}} onClick={()=>toggleExpand(r.id)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{r.proveedor||'Sin nombre'}</div>
              <div style={{fontSize:12,color:'#666',marginTop:2}}>{fmtDate(r.fecha)}</div>
              {editable&&<div style={{fontSize:11,color:'#4ade80',marginTop:2}}>✏️ Editable — {horas}h restantes</div>}
              {!editable&&<div style={{fontSize:11,color:'#555',marginTop:2}}>🔒 Bloqueada</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <Badge estado={r.estado}/>
              <span style={{color:'#555',fontSize:16}}>{expandedId===r.id?'▲':'▼'}</span>
            </div>
          </div>
          {r.foto_dte_url&&<div style={{marginTop:8}}><img src={r.foto_dte_url} style={{width:60,height:45,objectFit:'cover',borderRadius:6}} alt="DTE"/></div>}

          {expandedId===r.id&&(
            <div style={{marginTop:12,borderTop:'1px solid #2a2a2a',paddingTop:12}} onClick={e=>e.stopPropagation()}>
              {loadingItems&&<div className="spin" style={{width:20,height:20,margin:'8px auto'}}/>}
              {!loadingItems&&items.map((it,idx)=>(
                <div key={it.id} style={{padding:'8px 0',borderBottom:'1px solid #1a1a1a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500}}>{it.descripcion||'Producto'}</div>
                    <div style={{fontSize:11,color:'#555'}}>{it.unidad}</div>
                  </div>
                  {editable?(
                    <input type="number" value={it.qty_edit} onChange={e=>updItem(idx,e.target.value)}
                      style={{width:70,textAlign:'center',background:'#1a1a1a',border:'1px solid #333',borderRadius:6,color:'#f0f0f0',padding:'6px',fontSize:14}}
                      min="0" step="0.01"/>
                  ):(
                    <div style={{fontWeight:600,fontSize:14}}>{it.cantidad_recibida}</div>
                  )}
                </div>
              ))}
              {editable&&!loadingItems&&items.length>0&&(
                <button className="btn btn-green" style={{marginTop:10,fontSize:13,padding:'10px'}} onClick={()=>guardarCambios(r)} disabled={saving}>
                  {saving?'Guardando...':'💾 Guardar correcciones'}
                </button>
              )}
            </div>
          )}
        </div>
      );})}
    </div>
  );
}

// ── HOME / APP ────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('recepcion');
  const {show,Toast}=useToast();

  if(!user) return <Login onLogin={u=>setUser(u)}/>;

  return(
    <div style={{minHeight:'100vh'}}>
      <Toast/>
      {/* Header */}
      <div style={{padding:'16px 16px 12px',background:'#111',borderBottom:'1px solid #1e1e1e',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontWeight:800,fontSize:17}}>🏭 Almacén FD</div>
          <div style={{fontSize:12,color:'#555',marginTop:1}}>{user.nombre} {user.apellido} · {user.rol}</div>
        </div>
        <button onClick={()=>setUser(null)} style={{background:'none',border:'1px solid #2a2a2a',color:'#666',padding:'6px 12px',borderRadius:8,fontSize:12,cursor:'pointer'}}>Salir</button>
      </div>
      {/* Tabs */}
      <div className="tab-bar">
        <div className={`tab ${tab==='recepcion'?'active':''}`} onClick={()=>setTab('recepcion')}>📥 Recepción</div>
        <div className={`tab ${tab==='despacho'?'active':''}`} onClick={()=>setTab('despacho')}>🚚 Despacho</div>
        <div className={`tab ${tab==='inventario'?'active':''}`} onClick={()=>setTab('inventario')}>📦 Inventario</div>
        <div className={`tab ${tab==='historial'?'active':''}`} onClick={()=>setTab('historial')}>📋 Historial</div>
      </div>
      {/* Content */}
      {tab==='recepcion'&&<RecepcionTab user={user} show={show}/>}
      {tab==='despacho'&&<DespachoTab user={user} show={show}/>}
      {tab==='inventario'&&<InventarioTab user={user} show={show}/>}
      {tab==='historial'&&<HistorialTab user={user} show={show}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
