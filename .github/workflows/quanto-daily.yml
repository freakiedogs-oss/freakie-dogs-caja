name: Quanto Daily Download

on:
  schedule:
    - cron: '0 15 * * *'  # 9:00 AM CST El Salvador (UTC-6)
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha a procesar YYYY-MM-DD (vacio = ayer CST)'
        required: false
        default: ''

jobs:
  download-and-process:
    name: Descargar DTEs de QUANTO a Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install --no-audit --no-fund

      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Ejecutar descarga y procesamiento
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
          QUANTO_UID: ${{ secrets.QUANTO_UID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FECHA: ${{ github.event.inputs.fecha }}
        run: node scripts/quanto-download.js

      - name: Resumen de ejecucion
        if: always()
        run: echo "Workflow finalizado a las $(date -u '+%Y-%m-%d %H:%M UTC')"
