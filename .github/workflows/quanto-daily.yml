name: Quanto Daily Download

on:
  schedule:
    # 9:00 AM hora El Salvador (CST = UTC-6) = 15:00 UTC
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha a procesar (YYYY-MM-DD). Si estÃ¡ vacÃ­o, usa ayer.'
        required: false
        default: ''

jobs:
  download-and-process:
    name: Descargar DTEs de QUANTO â Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  # disabled - no package-lock.json committed

      - name: Instalar dependencias npm
        run: npm install --no-audit --no-fund

      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Ejecutar descarga y procesamiento
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
          QUANTO_UID: ${{ secrets.QUANTO_UID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FECHA: ${{ github.event.inputs.fecha }}
        run: node scripts/quanto-download.js

      - name: Resumen de ejecuciÃ³n
        if: always()
        run: echo "Workflow finalizado a las $(date -u '+%Y-%m-%d %H:%M UTC')"
